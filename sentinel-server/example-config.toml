# Sentinel Policy Configuration
# Each [[policies]] block defines one policy rule.

[[policies]]
name = "Allow file reads"
tool_pattern = "file"
function_pattern = "read"
policy_type = "Allow"
priority = 10

[[policies]]
name = "Block file deletes"
tool_pattern = "file"
function_pattern = "delete"
policy_type = "Deny"
priority = 100

[[policies]]
name = "Block bash execution"
tool_pattern = "bash"
function_pattern = "*"
policy_type = "Deny"
priority = 200
id = "bash:*"

[[policies]]
name = "Default allow"
tool_pattern = "*"
function_pattern = "*"
policy_type = "Allow"
priority = 1

[[policies]]
name = "Network requires approval"
tool_pattern = "network"
function_pattern = "*"
priority = 150
id = "network:*"

[policies.policy_type.Conditional]
conditions = { require_approval = true }

# --- Parameter Constraint Examples ---

[[policies]]
name = "Block credential access"
tool_pattern = "file_system"
function_pattern = "read_file"
priority = 200
id = "file_system:read_file"

[policies.policy_type.Conditional.conditions]
parameter_constraints = [
  { param = "path", op = "glob", pattern = "/home/*/.aws/**", on_match = "deny" },
  { param = "path", op = "glob", pattern = "/home/*/.ssh/**", on_match = "deny" },
]

[[policies]]
name = "HTTP domain allowlist"
tool_pattern = "http_request"
function_pattern = "*"
priority = 200
id = "http_request:*"

[policies.policy_type.Conditional.conditions]
parameter_constraints = [
  { param = "url", op = "domain_not_in", patterns = ["*.example.com", "api.anthropic.com"], on_match = "deny" },
]

[[policies]]
name = "Dangerous command detection"
tool_pattern = "bash"
function_pattern = "execute"
priority = 300
id = "bash:execute"

[policies.policy_type.Conditional.conditions]
parameter_constraints = [
  { param = "command", op = "regex", pattern = "(?i)rm\\s+-rf", on_match = "require_approval" },
]

# --- Rate Limiting ---
# Optional: configure rate limits here instead of (or in addition to) env vars.
# Env vars (SENTINEL_RATE_*) override these values when set.
# Omit a field or set to 0 to disable that category.

[rate_limit]
evaluate_rps = 1000
evaluate_burst = 50
admin_rps = 20
# admin_burst = 5     # uncomment to allow admin burst
readonly_rps = 200
# readonly_burst = 20  # uncomment to allow readonly burst
per_ip_rps = 100
per_ip_burst = 10
# per_ip_max_capacity = 100000  # default: 100,000 unique IPs

# --- Wildcard Parameter Scanning (param = "*") ---
# Scans ALL string values recursively in parameters, regardless of key name.
# Catches dangerous content buried in nested/unexpected parameter locations.

[[policies]]
name = "Scan all values for credential paths"
tool_pattern = "*"
function_pattern = "*"
priority = 250
id = "*:*:credential-scan"

[policies.policy_type.Conditional.conditions]
on_no_match = "continue"
parameter_constraints = [
  { param = "*", op = "glob", pattern = "/home/*/.aws/**", on_match = "deny", on_missing = "skip" },
  { param = "*", op = "glob", pattern = "/home/*/.ssh/**", on_match = "deny", on_missing = "skip" },
]

[[policies]]
name = "Scan all values for exfiltration domains"
tool_pattern = "*"
function_pattern = "*"
priority = 250
id = "*:*:domain-scan"

[policies.policy_type.Conditional.conditions]
on_no_match = "continue"
parameter_constraints = [
  { param = "*", op = "domain_match", pattern = "*.ngrok.io", on_match = "deny", on_missing = "skip" },
  { param = "*", op = "domain_match", pattern = "*.requestbin.com", on_match = "deny", on_missing = "skip" },
]
