<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" fill="none">
<rect width="1200" height="300" fill="#0B1020"/>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#C04BF0" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#32D1FF" stop-opacity="0.06"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#C04BF0" stop-opacity="0"/>
    <stop offset="50%" stop-color="#C04BF0" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#32D1FF" stop-opacity="0"/>
  </linearGradient>
</defs>
<rect width="1200" height="300" fill="url(#bg)"/>
<!-- Centered logomark (100px wide, centered at x=600) -->
<g transform="translate(552,18)">
  <polygon points="48,11.52 84.67,27.58 84.67,68.42 48,84.48 11.33,68.42 11.33,27.58" stroke="#9AA4B2" stroke-width="6" stroke-linejoin="round" fill="none"/>
  <path d="M 33.5 33.5 L 48 67.08 L 62.5 33.5" stroke="#C04BF0" stroke-width="10.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="27.65" y1="48" x2="68.35" y2="48" stroke="#32D1FF" stroke-width="8.9" stroke-linecap="round"/>
</g>
<!-- VellaVeto centered below logo -->
<text x="600" y="145" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-weight="900" font-size="48" fill="#E6EAF2" letter-spacing="-0.02em" text-anchor="middle">Vella<tspan fill="#C04BF0">Veto</tspan></text>
<!-- Tagline -->
<text x="600" y="185" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-weight="400" font-size="19" fill="#9AA4B2" text-anchor="middle">Agentic security control plane for MCP and AI agent tool calls</text>
<!-- Accent line -->
<line x1="440" y1="210" x2="760" y2="210" stroke="url(#accent)" stroke-width="1"/>
