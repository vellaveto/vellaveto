[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
# cargo-deny >=0.19.0: unmaintained/unsound use scope values, not severity
unmaintained = "workspace"
unsound = "workspace"
yanked = "warn"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
required-git-spec = "rev"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "AGPL-3.0-only",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "NCSA",
  "OpenSSL",
  "CDLA-Permissive-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Unlicense",
  "Zlib",
  "0BSD",
]
