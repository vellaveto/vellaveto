[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
# cargo-deny >=0.19.0: unmaintained/unsound use scope values, not severity
unmaintained = "workspace"
unsound = "workspace"
yanked = "warn"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
# Explicitly allow known unavoidable duplicate transitive versions so new
# duplicate drift is easier to spot in CI output.
skip = [
  { name = "bitflags", version = "=1.3.2" },
  { name = "foldhash", version = "=0.1.5" },
  { name = "getrandom", version = "=0.2.17" },
  { name = "getrandom", version = "=0.3.4" },
  { name = "hashbrown", version = "=0.14.5" },
  { name = "hashbrown", version = "=0.15.5" },
  { name = "rand", version = "=0.9.2" },
  { name = "rand_chacha", version = "=0.9.0" },
  { name = "rand_core", version = "=0.9.5" },
  { name = "thiserror", version = "=1.0.69" },
  { name = "thiserror-impl", version = "=1.0.69" },
  { name = "untrusted", version = "=0.7.1" },
  { name = "windows-sys", version = "=0.52.0" },
  { name = "windows-sys", version = "=0.60.2" },
  { name = "windows-targets", version = "=0.52.6" },
  { name = "windows_aarch64_gnullvm", version = "=0.52.6" },
  { name = "windows_aarch64_msvc", version = "=0.52.6" },
  { name = "windows_i686_gnu", version = "=0.52.6" },
  { name = "windows_i686_gnullvm", version = "=0.52.6" },
  { name = "windows_i686_msvc", version = "=0.52.6" },
  { name = "windows_x86_64_gnu", version = "=0.52.6" },
  { name = "windows_x86_64_gnullvm", version = "=0.52.6" },
  { name = "windows_x86_64_msvc", version = "=0.52.6" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
required-git-spec = "rev"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "AGPL-3.0-only",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MIT-0",
  "OpenSSL",
  "CDLA-Permissive-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
  "0BSD",
]
