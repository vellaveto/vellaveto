# deny.toml — cargo-deny configuration for Vellaveto supply chain hardening
#
# Run: cargo deny check
# CI:  cargo deny --all-features check
#
# Docs: https://embarkstudios.github.io/cargo-deny/

# ---------------------------------------------------------------------------
# [advisories] — Deny known vulnerabilities from the RustSec advisory database
# ---------------------------------------------------------------------------
[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
# Treat unmaintained and unsound crates as workspace-level warnings so they
# surface in CI but do not hard-block builds (these are informational).
unmaintained = "workspace"
unsound = "workspace"
# Yanked crates should block — a yanked version was pulled for a reason.
yanked = "deny"
# Explicitly ignored advisories (with justification required for each).
# Keep this list empty; add entries only with a comment explaining why.
ignore = []

# ---------------------------------------------------------------------------
# [bans] — Detect duplicate crate versions and wildcard dependencies
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
# Explicitly allow known unavoidable duplicate transitive versions so new
# duplicate drift is easier to spot in CI output.
skip = [
  { name = "bitflags", version = "=1.3.2" },
  { name = "foldhash", version = "=0.1.5" },
  { name = "getrandom", version = "=0.2.17" },
  { name = "getrandom", version = "=0.3.4" },
  { name = "hashbrown", version = "=0.14.5" },
  { name = "hashbrown", version = "=0.15.5" },
  { name = "rand", version = "=0.9.2" },
  { name = "rand_chacha", version = "=0.9.0" },
  { name = "rand_core", version = "=0.9.5" },
  { name = "thiserror", version = "=1.0.69" },
  { name = "thiserror-impl", version = "=1.0.69" },
  { name = "untrusted", version = "=0.7.1" },
  { name = "windows-sys", version = "=0.52.0" },
  { name = "windows-sys", version = "=0.60.2" },
  { name = "windows-targets", version = "=0.52.6" },
  { name = "windows_aarch64_gnullvm", version = "=0.52.6" },
  { name = "windows_aarch64_msvc", version = "=0.52.6" },
  { name = "windows_i686_gnu", version = "=0.52.6" },
  { name = "windows_i686_gnullvm", version = "=0.52.6" },
  { name = "windows_i686_msvc", version = "=0.52.6" },
  { name = "windows_x86_64_gnu", version = "=0.52.6" },
  { name = "windows_x86_64_gnullvm", version = "=0.52.6" },
  { name = "windows_x86_64_msvc", version = "=0.52.6" },
]
skip-tree = []

# ---------------------------------------------------------------------------
# [sources] — Ensure all crates come from crates.io only
# ---------------------------------------------------------------------------
[sources]
# Deny crates from unknown registries — supply chain attack vector.
unknown-registry = "deny"
# Deny crates sourced from git — these bypass crates.io review and checksum
# verification. All dependencies must be published on crates.io.
unknown-git = "deny"
# Only allow the official crates.io registry.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# No git sources allowed. If a git dependency is temporarily needed, add it
# here with a comment explaining when it can be removed.
allow-git = []
# If git sources are ever allowed, require a pinned revision (not branch/tag)
# to prevent upstream mutations.
required-git-spec = "rev"

# ---------------------------------------------------------------------------
# [licenses] — Enforce license allowlist for all dependencies
# ---------------------------------------------------------------------------
[licenses]
version = 2
# Minimum confidence for SPDX license detection. 0.8 is the recommended
# default — it catches most license files while avoiding false positives.
confidence-threshold = 0.8
# Allowed licenses. This list is intentionally conservative.
# Every addition must be reviewed for compatibility with the project licenses.
allow = [
  # Project licenses
  "AGPL-3.0-only",
  "BUSL-1.1",
  # Permissive licenses compatible with AGPL-3.0
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MIT-0",
  "0BSD",
  "Unlicense",
  "Zlib",
  # Special-purpose licenses for specific dependency domains
  "OpenSSL",
  "CDLA-Permissive-2.0",
  # Unicode licenses (required by unicode-ident, icu4x, and related crates)
  "Unicode-3.0",
  "Unicode-DFS-2016",
]
# Crates whose license could not be auto-detected. Each entry requires a
# manual review confirming the license is acceptable.
exceptions = []
