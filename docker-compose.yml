# Vellaveto — Docker Compose for local development and testing
#
# Usage:
#   docker compose up -d          # Start Vellaveto
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop
#
# Environment variables:
#   VELLAVETO_API_KEY    — API key for authenticated endpoints (required)
#   VELLAVETO_CONFIG     — Path to config file (default: /etc/vellaveto/config.toml)
#
# Ports:
#   3000 — Vellaveto HTTP API server
#   3001 — Vellaveto HTTP reverse proxy

services:
  vellaveto:
    build: .
    image: ghcr.io/vellaveto/vellaveto:6.0.0
    ports:
      - "3000:3000"
    environment:
      - VELLAVETO_API_KEY=${VELLAVETO_API_KEY:?Set VELLAVETO_API_KEY in your environment}
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      - ./examples/production.toml:/etc/vellaveto/config.toml:ro
      - vellaveto-audit:/var/log/vellaveto
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  vellaveto-proxy:
    build: .
    image: ghcr.io/vellaveto/vellaveto:6.0.0
    entrypoint: ["vellaveto-http-proxy"]
    command: ["--config", "/etc/vellaveto/config.toml", "--listen", "0.0.0.0:3001"]
    ports:
      - "3001:3001"
    environment:
      - VELLAVETO_API_KEY=${VELLAVETO_API_KEY:?Set VELLAVETO_API_KEY in your environment}
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      - ./examples/production.toml:/etc/vellaveto/config.toml:ro
      - vellaveto-audit:/var/log/vellaveto
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vellaveto-audit:
