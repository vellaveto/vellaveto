[workspace]
resolver = "2"
members = [
    "sentinel-types",
    "sentinel-engine",
    "sentinel-audit",
    "sentinel-mcp",
    "sentinel-canonical",
    "sentinel-config",
    "sentinel-integration",
    "sentinel-server",
]

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
thiserror = "1.0"
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"