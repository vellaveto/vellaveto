[workspace]
resolver = "2"
members = [
    "sentinel-types",
    "sentinel-engine",
    "sentinel-audit",
    "sentinel-mcp",
    "sentinel-canonical",
    "sentinel-config",
    "sentinel-integration",
    "sentinel-server",
    "sentinel-approval",
    "sentinel-proxy",
    "sentinel-http-proxy",
]

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
thiserror = "2.0"
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"
tracing = "0.1"

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3
strip = "symbols"
overflow-checks = true

[profile.bench]
inherits = "release"
debug = true