# Cargo audit configuration
# See https://github.com/rustsec/rustsec/tree/main/cargo-audit

[advisories]
# Ignore informational advisories for unmaintained transitive dependencies
# that have no security vulnerability and no available replacement in the
# dependency chain.
ignore = [
    # `instant` is unmaintained — pulled in transitively by notify → notify-types.
    # No vulnerability; the crate is functionally stable. Will resolve when
    # notify drops the dependency.
    "RUSTSEC-2024-0384",
]
