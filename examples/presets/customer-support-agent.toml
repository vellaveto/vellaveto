# Vellaveto Preset: Customer Support Agent
#
# For AI agents handling customer inquiries with CRM, ticketing, and
# knowledge base access. Strict DLP to prevent PII leakage. Read-only
# access to customer data with approval gating for modifications.
#
# Usage:
#   vellaveto serve --config examples/presets/customer-support-agent.toml --port 3000

# --- Block all file system access ---
[[policies]]
name = "Block file system"
tool_pattern = "file_*"
function_pattern = "*"
priority = 300
id = "support:file:block-all"

[policies.policy_type.Deny]
reason = "Customer support agents cannot access the file system"

# --- Allow CRM read operations ---
[[policies]]
name = "Allow CRM read"
tool_pattern = "crm_*"
function_pattern = "get*"
priority = 200
id = "support:crm:allow-read"

[policies.policy_type.Allow]

[policies.network_rules]
allowed_domains = ["*.salesforce.com", "*.hubspot.com", "*.zendesk.com"]

# --- Require approval for CRM writes ---
[[policies]]
name = "Require approval for CRM changes"
tool_pattern = "crm_*"
function_pattern = "update*"
priority = 200
id = "support:crm:require-approval"

[policies.policy_type.Conditional.conditions]
on_no_match = "require_approval"
parameter_constraints = []

# --- Allow knowledge base search ---
[[policies]]
name = "Allow knowledge base"
tool_pattern = "knowledge_*"
function_pattern = "*"
priority = 200
id = "support:kb:allow"

[policies.policy_type.Allow]

# --- Allow sending messages through approved channels ---
[[policies]]
name = "Allow approved messaging"
tool_pattern = "message_*"
function_pattern = "send"
priority = 200
id = "support:message:allow"

[policies.policy_type.Allow]

[policies.network_rules]
allowed_domains = ["*.slack.com", "*.intercom.io", "api.sendgrid.com"]

# --- Default deny ---
[[policies]]
name = "Default deny"
tool_pattern = "*"
function_pattern = "*"
priority = 0
id = "support:*:default-deny"

[policies.policy_type.Deny]
reason = "Action not permitted for customer support agents"

# --- Enhanced DLP for PII protection ---
[detection]
injection_enabled = true
injection_blocking = true
dlp_enabled = true
dlp_blocking = true
behavioral_enabled = true
