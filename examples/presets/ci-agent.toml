# Vellaveto Preset: CI/CD Agent
#
# For AI agents running in CI/CD pipelines (GitHub Actions, GitLab CI,
# Jenkins). Strict network controls, no interactive approval (auto-deny),
# and tight path restrictions to prevent supply chain attacks.
#
# Usage:
#   vellaveto serve --config examples/presets/ci-agent.toml --port 3000

# --- Block all credential paths ---
[[policies]]
name = "Block credential access in CI"
tool_pattern = "*"
function_pattern = "*"
priority = 300
id = "ci:*:credential-block"

[policies.policy_type.Conditional.conditions]
on_no_match = "continue"
parameter_constraints = [
  { param = "*", op = "glob", pattern = "/home/*/.aws/**",       on_match = "deny", on_missing = "skip" },
  { param = "*", op = "glob", pattern = "/home/*/.ssh/**",       on_match = "deny", on_missing = "skip" },
  { param = "*", op = "glob", pattern = "**/.env",               on_match = "deny", on_missing = "skip" },
  { param = "*", op = "glob", pattern = "**/.env.*",             on_match = "deny", on_missing = "skip" },
  { param = "*", op = "glob", pattern = "**/secrets*",           on_match = "deny", on_missing = "skip" },
  { param = "*", op = "glob", pattern = "**/credentials*",      on_match = "deny", on_missing = "skip" },
]

# --- Network allowlist: only approved domains ---
[[policies]]
name = "Network allowlist"
tool_pattern = "*"
function_pattern = "*"
priority = 250
id = "ci:*:network-allowlist"

[policies.network_rules]
allowed_domains = [
  "github.com",
  "api.github.com",
  "registry.npmjs.org",
  "pypi.org",
  "crates.io",
  "index.crates.io",
  "static.crates.io",
]
blocked_domains = []

[policies.network_rules.ip_rules]
block_private = true

# --- Block shell execution with dangerous patterns ---
[[policies]]
name = "Block dangerous CI commands"
tool_pattern = "*"
function_pattern = "*"
priority = 200
id = "ci:*:dangerous-commands"

[policies.policy_type.Conditional.conditions]
on_no_match = "continue"
parameter_constraints = [
  { param = "*", op = "regex", pattern = "curl.*\\|.*(sh|bash)",  on_match = "deny", on_missing = "skip" },
  { param = "*", op = "regex", pattern = "wget.*\\|.*(sh|bash)",  on_match = "deny", on_missing = "skip" },
  { param = "*", op = "regex", pattern = "rm\\s+-rf\\s+/",        on_match = "deny", on_missing = "skip" },
  { param = "*", op = "regex", pattern = "sudo\\s+",              on_match = "deny", on_missing = "skip" },
]

# --- Allow remaining tool calls ---
[[policies]]
name = "Default allow for CI"
tool_pattern = "*"
function_pattern = "*"
priority = 1
id = "ci:*:default-allow"
policy_type = "Allow"

# --- Injection detection (blocking in CI) ---
[injection]
enabled = true
blocking = true

# --- DLP scanning (blocking in CI) ---
[dlp]
enabled = true
blocking = true

# --- Audit ---
[audit]
redaction_level = "KeysAndPatterns"
