# Sentinel Demo Policy — Credential Exfiltration Prevention
#
# This policy configuration demonstrates Sentinel's core security value:
# blocking an AI agent from reading sensitive credentials and exfiltrating
# them to attacker-controlled infrastructure.
#
# Attack scenario:
#   1. Agent is prompted to read ~/.aws/credentials
#   2. Agent tries to send the contents to an external server
#   3. Sentinel blocks BOTH steps with clear audit trail
#
# Usage:
#   export SENTINEL_API_KEY=demo-key-12345
#   cargo run -p sentinel-server -- serve --config examples/credential-exfil-demo.toml
#
#   # Then in another terminal, try the attacks:
#   ./examples/demo-exfil-attack.sh

# ============================================================
# RULE 1: Block access to credential files (highest priority)
# ============================================================
# Blocks any tool from reading SSH keys, AWS creds, GCP tokens, etc.
# on_no_match = "continue" ensures non-matching actions fall through
# to lower-priority rules (e.g., domain blocking).

[[policies]]
name = "Block credential file access"
tool_pattern = "*"
function_pattern = "*"
priority = 300
id = "*:*:credential-block"

[policies.policy_type.Conditional.conditions]
on_no_match = "continue"
parameter_constraints = [
  { param = "*", op = "glob", pattern = "/home/*/.aws/**", on_match = "deny", on_missing = "skip" },
  { param = "*", op = "glob", pattern = "/home/*/.ssh/**", on_match = "deny", on_missing = "skip" },
  { param = "*", op = "glob", pattern = "/home/*/.gcp/**", on_match = "deny", on_missing = "skip" },
  { param = "*", op = "glob", pattern = "/home/*/.azure/**", on_match = "deny", on_missing = "skip" },
  { param = "*", op = "glob", pattern = "/etc/shadow", on_match = "deny", on_missing = "skip" },
  { param = "*", op = "glob", pattern = "/etc/passwd", on_match = "deny", on_missing = "skip" },
]

# ============================================================
# RULE 2: Block known exfiltration channels
# ============================================================
# Catches exfiltration via tunneling services, pastebin, etc.
# on_no_match = "continue" ensures non-matching actions fall through.

[[policies]]
name = "Block exfiltration domains"
tool_pattern = "*"
function_pattern = "*"
priority = 280
id = "*:*:exfil-block"

[policies.policy_type.Conditional.conditions]
on_no_match = "continue"
parameter_constraints = [
  { param = "*", op = "domain_match", pattern = "*.ngrok.io", on_match = "deny", on_missing = "skip" },
  { param = "*", op = "domain_match", pattern = "*.requestbin.com", on_match = "deny", on_missing = "skip" },
  { param = "*", op = "domain_match", pattern = "*.pipedream.net", on_match = "deny", on_missing = "skip" },
  { param = "*", op = "domain_match", pattern = "*.pastebin.com", on_match = "deny", on_missing = "skip" },
  { param = "*", op = "domain_match", pattern = "*.webhook.site", on_match = "deny", on_missing = "skip" },
]

# ============================================================
# RULE 3: Block network exfiltration to untrusted domains
# ============================================================
# Only allows HTTP requests to a specific set of trusted APIs.
# on_no_match = "continue" so non-HTTP actions aren't auto-allowed.

[[policies]]
name = "HTTP domain allowlist"
tool_pattern = "http_request"
function_pattern = "*"
priority = 250
id = "http_request:*:domain-allowlist"

[policies.policy_type.Conditional.conditions]
on_no_match = "continue"
parameter_constraints = [
  { param = "url", op = "domain_not_in", patterns = ["api.example.com", "*.internal.corp"], on_match = "deny" },
]

# ============================================================
# RULE 4: Dangerous commands require approval
# ============================================================
# rm -rf, file deletion, etc. go to approval queue.
# on_no_match = "continue" so safe commands fall through to default allow.

[[policies]]
name = "Dangerous commands require approval"
tool_pattern = "bash"
function_pattern = "execute"
priority = 200
id = "bash:execute:dangerous"

[policies.policy_type.Conditional.conditions]
on_no_match = "continue"
parameter_constraints = [
  { param = "command", op = "regex", pattern = "(?i)(rm\\s+-rf|dd\\s+if=|mkfs|format|fdisk)", on_match = "require_approval" },
]

# ============================================================
# RULE 5: Default allow for safe operations
# ============================================================
# Catch-all at lowest priority — everything not blocked is allowed.

[[policies]]
name = "Default allow"
tool_pattern = "*"
function_pattern = "*"
policy_type = "Allow"
priority = 1
