name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to Sentinel.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What is your use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Policy engine (sentinel-engine)
        - Types (sentinel-types)
        - Configuration (sentinel-config)
        - MCP handling (sentinel-mcp)
        - Audit logging (sentinel-audit)
        - HTTP proxy (sentinel-http-proxy)
        - Server API (sentinel-server)
        - Python SDK
        - Documentation
        - CI/CD
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, diagrams, or references.
