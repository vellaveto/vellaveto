name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to Vellaveto.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What is your use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Policy engine (vellaveto-engine)
        - Types (vellaveto-types)
        - Configuration (vellaveto-config)
        - MCP handling (vellaveto-mcp)
        - Audit logging (vellaveto-audit)
        - Consumer Shield (vellaveto-mcp-shield)
        - Threat detection (injection/DLP/squatting)
        - Discovery (topology)
        - HTTP proxy (vellaveto-http-proxy)
        - Server API (vellaveto-server)
        - Cluster (vellaveto-cluster)
        - Kubernetes operator
        - Python SDK
        - TypeScript SDK
        - Go SDK
        - Java SDK
        - VS Code extension
        - Terraform provider
        - Admin console
        - Formal verification
        - Documentation
        - CI/CD
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, diagrams, or references.
