name: Bug Report
description: Report a bug in Vellaveto
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below to help us investigate.

  - type: input
    id: version
    attributes:
      label: Vellaveto Version
      description: Output of `vellaveto --version` or crate version
      placeholder: "6.0.0"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Mode
      options:
        - Stdio proxy (vellaveto-proxy)
        - HTTP reverse proxy (vellaveto-http-proxy)
        - HTTP API server (vellaveto-server)
        - Consumer Shield (vellaveto-shield)
        - Python SDK
        - TypeScript SDK
        - Go SDK
        - Java SDK
        - Docker
        - Kubernetes operator
        - Library (embedded crate)
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Policy engine (vellaveto-engine)
        - Types (vellaveto-types)
        - Configuration (vellaveto-config)
        - MCP handling (vellaveto-mcp)
        - Audit logging (vellaveto-audit)
        - Consumer Shield (vellaveto-mcp-shield)
        - Threat detection (injection/DLP/squatting)
        - Discovery (topology)
        - HTTP proxy (vellaveto-http-proxy)
        - Server API (vellaveto-server)
        - Cluster (vellaveto-cluster)
        - Kubernetes operator
        - Python SDK
        - TypeScript SDK
        - Go SDK
        - Java SDK
        - VS Code extension
        - Terraform provider
        - Admin console
        - Documentation
        - CI/CD
        - Other

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what happened.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant policy config (redact secrets).
      render: toml

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Relevant logs or error messages.
      render: text

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 24.04 / macOS 15 / Alpine 3.21"
