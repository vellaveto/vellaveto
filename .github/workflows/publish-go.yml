name: Publish Go SDK

# Go modules are published automatically via the Go module proxy when a tag
# matching the module path is pushed. This workflow verifies the SDK builds
# and tests against the tagged version, then requests the proxy to index it.
#
# Tag format: sdk/go/v6.0.0 (matches go.mod module path)

on:
  push:
    tags: ["sdk/go/v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: "Test (Go ${{ matrix.go-version }})"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.21", "1.22", "1.23"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        working-directory: sdk/go
        run: go build ./...

      - name: Test
        working-directory: sdk/go
        run: go test -v -race -count=1 ./...

      - name: Vet
        working-directory: sdk/go
        run: go vet ./...

  index:
    name: Request Go proxy indexing
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/sdk/go/v')
    steps:
      - name: Request proxy indexing
        run: |
          VERSION="${GITHUB_REF_NAME#sdk/go/}"
          MODULE="github.com/vellaveto/vellaveto/sdk/go"
          echo "Requesting indexing for ${MODULE}@${VERSION}"
          curl -sf "https://proxy.golang.org/${MODULE}/@v/${VERSION}.info" || echo "Proxy will index on first fetch"
          curl -sf "https://sum.golang.org/lookup/${MODULE}@${VERSION}" || echo "Sum DB will index on first fetch"
