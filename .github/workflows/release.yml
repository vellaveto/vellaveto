name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Build release binaries (static musl)
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Strip binaries
        run: |
          strip target/x86_64-unknown-linux-musl/release/vellaveto
          strip target/x86_64-unknown-linux-musl/release/vellaveto-http-proxy
          strip target/x86_64-unknown-linux-musl/release/vellaveto-proxy

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release
          for bin in vellaveto vellaveto-http-proxy vellaveto-proxy; do
            cp "target/x86_64-unknown-linux-musl/release/$bin" "release/"
          done
          cp LICENSE LICENSING.md NOTICE README.md CHANGELOG.md release/
          cp -r examples/ release/examples/
          tar czf "vellaveto-${VERSION}-x86_64-linux-musl.tar.gz" -C release .
          sha256sum "vellaveto-${VERSION}-x86_64-linux-musl.tar.gz" > checksums-sha256.txt
          for bin in release/vellaveto release/vellaveto-http-proxy release/vellaveto-proxy; do
            sha256sum "$bin" >> checksums-sha256.txt
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            release/vellaveto
            release/vellaveto-http-proxy
            release/vellaveto-proxy

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract section between this version header and the next
          awk "/^## \[${VERSION}\]/{found=1;next} /^## \[/{if(found)exit} found{print}" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${VERSION}" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          body_path: release-notes.md
          files: |
            vellaveto-*-x86_64-linux-musl.tar.gz
            checksums-sha256.txt
            sbom.cdx.json
          fail_on_unmatched_files: true
          generate_release_notes: false
