name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: "Build (${{ matrix.target }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-15
            archive: tar.gz
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binaries (Linux)
        if: contains(matrix.target, 'linux') && !matrix.cross
        run: |
          for bin in vellaveto vellaveto-http-proxy vellaveto-proxy vellaveto-shield; do
            strip "target/${{ matrix.target }}/release/$bin" 2>/dev/null || true
          done

      - name: Strip binaries (Linux cross)
        if: matrix.cross
        run: |
          for bin in vellaveto vellaveto-http-proxy vellaveto-proxy vellaveto-shield; do
            aarch64-linux-gnu-strip "target/${{ matrix.target }}/release/$bin" 2>/dev/null || true
          done

      - name: Strip binaries (macOS)
        if: contains(matrix.target, 'apple')
        run: |
          for bin in vellaveto vellaveto-http-proxy vellaveto-proxy vellaveto-shield; do
            strip "target/${{ matrix.target }}/release/$bin" 2>/dev/null || true
          done

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release
          for bin in vellaveto vellaveto-http-proxy vellaveto-proxy vellaveto-shield; do
            cp "target/${{ matrix.target }}/release/$bin" "release/" 2>/dev/null || true
          done
          cp LICENSE LICENSING.md NOTICE README.md CHANGELOG.md release/
          cp -r examples/ release/examples/
          tar czf "vellaveto-${VERSION}-${{ matrix.target }}.${{ matrix.archive }}" -C release .

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-${{ matrix.target }}
          path: vellaveto-*-${{ matrix.target }}.*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum vellaveto-*.tar.gz > checksums-sha256.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract section between this version header and the next
          awk "/^## \[${VERSION}\]/{found=1;next} /^## \[/{if(found)exit} found{print}" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${VERSION}" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          body_path: release-notes.md
          files: |
            vellaveto-*.tar.gz
            checksums-sha256.txt
            sbom.cdx.json
          fail_on_unmatched_files: false
          generate_release_notes: false
