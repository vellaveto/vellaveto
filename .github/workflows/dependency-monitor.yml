name: Dependency Monitor

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * *'

jobs:
  dependency-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
      - name: Run dependency monitor
        run: |
          chmod +x scripts/run-dependency-monitor.sh
          scripts/run-dependency-monitor.sh target/security
      - name: Upload dependency telemetry
        uses: actions/upload-artifact@v4
        with:
          name: dependency-monitor-logs
          path: target/security
