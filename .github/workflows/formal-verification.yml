name: Formal Verification

on:
  push:
    branches: [main]
    paths:
      - "formal/**"
      - "vellaveto-engine/src/**"
      - "vellaveto-mcp/src/inspection/**"
      - "vellaveto-mcp/src/capability_token.rs"
      - "vellaveto-mcp/src/task_state.rs"
      - "vellaveto-engine/src/collusion.rs"
      - "vellaveto-tls/src/**"
  pull_request:
    paths:
      - "formal/**"
      - "vellaveto-engine/src/**"
      - "vellaveto-mcp/src/inspection/**"
      - "vellaveto-mcp/src/capability_token.rs"
      - "vellaveto-mcp/src/task_state.rs"
      - "vellaveto-engine/src/collusion.rs"
      - "vellaveto-tls/src/**"
  # Weekly full verification even without changes
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tla-plus:
    name: "TLA+ Model Checking (6 specs)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: "21"

      - name: Download TLA+ tools
        run: |
          mkdir -p formal/tla
          curl -sSL -o formal/tla/tla2tools.jar \
            "https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar"

      - name: Run TLC on all 6 specifications
        working-directory: formal/tla
        run: |
          set -e
          for spec in MCPPolicyEngine AbacForbidOverrides MCPTaskLifecycle CascadingFailure WorkflowConstraint CapabilityDelegation; do
            mc="MC_${spec}.tla"
            main="${spec}.tla"
            cfg="${spec}.cfg"
            if [ -f "$mc" ]; then
              echo "=== TLA+ $spec (via MC_${spec}) ==="
              java -jar tla2tools.jar -config "$cfg" "$mc"
            elif [ -f "$cfg" ] && [ -f "$main" ]; then
              echo "=== TLA+ $spec (direct) ==="
              java -jar tla2tools.jar -config "$cfg" "$main"
            else
              echo "SKIP: $spec (files not found)"
            fi
          done

  lean:
    name: "Lean 4 (5 files, 30 theorems)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install elan and Lean 4
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build Lean proofs
        working-directory: formal/lean
        run: |
          lake update
          lake build

      - name: Verify no sorry markers
        working-directory: formal/lean
        run: |
          if grep -rn 'sorry' Vellaveto/*.lean; then
            echo "FAIL: sorry markers found in Lean proofs"
            exit 1
          fi

  coq:
    name: "Coq (8 files, 43 theorems)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Coq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq coq

      - name: Build Coq proofs
        working-directory: formal/coq
        run: |
          coq_makefile -f _CoqProject -o CoqMakefile
          make -f CoqMakefile

      - name: Verify no Admitted markers
        working-directory: formal/coq
        run: |
          if grep -rn 'Admitted' Vellaveto/*.v; then
            echo "FAIL: Admitted markers found in Coq proofs"
            exit 1
          fi

  kani:
    name: "Kani (60 harnesses — K1-K60)"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Kani
        run: |
          cargo install --locked kani-verifier
          cargo kani setup

      - name: Verify extracted code correspondence (unit tests)
        working-directory: formal/kani
        run: |
          echo "=== Running Kani production parity unit tests (83 tests) ==="
          echo "These tests verify extracted algorithms match production behavior."
          cargo test --lib

      - name: Verify extraction sync (function signatures)
        run: |
          echo "=== Checking extracted functions match production signatures ==="
          # Core functions that must stay in sync
          grep -q 'pub fn is_private_ip' vellaveto-engine/src/ip.rs
          grep -q 'pub fn is_private_ipv4' formal/kani/src/ip.rs
          grep -q 'pub fn compute_entropy' vellaveto-engine/src/collusion.rs
          grep -q 'pub fn compute_entropy' formal/kani/src/entropy.rs
          grep -q 'fn is_terminal' vellaveto-types/src/task.rs
          grep -q 'pub fn is_terminal' formal/kani/src/task.rs
          grep -q 'fn grant_covers_action' vellaveto-mcp/src/capability_token.rs
          grep -q 'pub fn grant_covers_action' formal/kani/src/capability.rs
          grep -q 'fn normalize_path_for_grant' vellaveto-mcp/src/capability_token.rs
          grep -q 'pub fn normalize_path_for_grant' formal/kani/src/capability.rs
          echo "All extraction signatures verified."

      - name: Run Kani proofs
        working-directory: formal/kani
        run: cargo kani

  verus:
    name: "Verus (29 proofs — V1-V12, D1-D6)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust toolchain for Verus
        run: rustup install 1.93.1-x86_64-unknown-linux-gnu

      - name: Download Verus binary release
        run: |
          VERUS_VERSION="0.2026.03.01.25809cb"
          curl -sSL -o verus.zip \
            "https://github.com/verus-lang/verus/releases/download/release/${VERUS_VERSION}/verus-${VERUS_VERSION}-x86-linux.zip"
          unzip -q verus.zip -d verus-bin
          chmod +x verus-bin/verus-x86-linux/verus

      - name: Run Verus verification (V1-V8, V11-V12, core verdict)
        run: |
          echo "=== Verus: verified_core (V1-V8, V11-V12, ALL inputs) ==="
          verus-bin/verus-x86-linux/verus --triggers-mode silent \
            formal/verus/verified_core.rs

      - name: Run Verus verification (D1-D6, DLP buffer)
        run: |
          echo "=== Verus: verified_dlp_core (D1-D6, ALL inputs) ==="
          verus-bin/verus-x86-linux/verus --triggers-mode silent \
            formal/verus/verified_dlp_core.rs

      - name: Run Verus verification (V9-V10, path normalization)
        run: |
          echo "=== Verus: verified_path (V9-V10, ALL inputs) ==="
          verus-bin/verus-x86-linux/verus --triggers-mode silent \
            formal/verus/verified_path.rs
