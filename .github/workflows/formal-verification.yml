name: Formal Verification

on:
  push:
    branches: [main]
    paths:
      - "formal/**"
      - "vellaveto-engine/src/**"
      - "vellaveto-mcp/src/inspection/**"
      - "vellaveto-mcp/src/capability_token.rs"
      - "vellaveto-mcp/src/nhi.rs"
      - "vellaveto-mcp/src/verified_capability_identity.rs"
      - "vellaveto-mcp/src/verified_nhi_delegation.rs"
      - "vellaveto-mcp/src/task_state.rs"
      - "vellaveto-engine/src/collusion.rs"
      - "vellaveto-engine/src/domain.rs"
      - "vellaveto-types/src/unicode.rs"
      - "vellaveto-tls/src/**"
      - "vellaveto-mcp-shield/src/sanitizer.rs"
  pull_request:
    paths:
      - "formal/**"
      - "vellaveto-engine/src/**"
      - "vellaveto-mcp/src/inspection/**"
      - "vellaveto-mcp/src/capability_token.rs"
      - "vellaveto-mcp/src/nhi.rs"
      - "vellaveto-mcp/src/verified_capability_identity.rs"
      - "vellaveto-mcp/src/verified_nhi_delegation.rs"
      - "vellaveto-mcp/src/task_state.rs"
      - "vellaveto-engine/src/collusion.rs"
      - "vellaveto-engine/src/domain.rs"
      - "vellaveto-types/src/unicode.rs"
      - "vellaveto-tls/src/**"
      - "vellaveto-mcp-shield/src/sanitizer.rs"
  workflow_dispatch:
  # Weekly full verification even without changes
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trusted-assumptions:
    name: "Trusted Assumption Inventory"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Verify explicit formal assumption inventory
        run: bash formal/tools/check-formal-trusted-assumptions.sh

  tla-plus:
    name: "TLA+ Model Checking (${{ matrix.spec }})"
    strategy:
      fail-fast: false
      matrix:
        spec:
          - MCPPolicyEngine
          - AbacForbidOverrides
          - MCPTaskLifecycle
          - CascadingFailure
          - WorkflowConstraint
          - CapabilityDelegation
          - CredentialVault
          - AuditChain
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: "21"

      - name: Download TLA+ tools
        run: |
          set -euo pipefail
          TLA_VERSION="v1.8.0"
          TLA_SHA256="11535876a02412e28b3d093f7fa25455c8fe2cdef1602da4d189ac1688d77b3e"
          mkdir -p formal/tla
          curl -fsSL --retry 3 --retry-delay 2 -o formal/tla/tla2tools.jar \
            "https://github.com/tlaplus/tlaplus/releases/download/${TLA_VERSION}/tla2tools.jar"
          echo "${TLA_SHA256}  formal/tla/tla2tools.jar" | sha256sum -c -

      - name: Run TLC on ${{ matrix.spec }}
        env:
          TLA_JAVA_OPTS: -Xms512m -Xmx10g -XX:+UseParallelGC
        run: bash formal/tools/run-tla-spec.sh "${{ matrix.spec }}"

  lean:
    name: "Lean 4 (5 files, 30 theorems)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install elan and Lean 4
        run: |
          set -euo pipefail
          ELAN_VERSION="v4.2.0"
          ELAN_SHA256="620db834935d0da55ac9cda207b2e370e8034061cbb0228af5eb6c14b02f0c0c"
          curl -fsSL --retry 3 --retry-delay 2 -o elan.tar.gz \
            "https://github.com/leanprover/elan/releases/download/${ELAN_VERSION}/elan-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ELAN_SHA256}  elan.tar.gz" | sha256sum -c -
          tar -xzf elan.tar.gz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build Lean proofs
        working-directory: formal/lean
        run: |
          lake update
          lake build

      - name: Verify no sorry markers
        working-directory: formal/lean
        run: |
          if grep -rn 'sorry' Vellaveto/*.lean; then
            echo "FAIL: sorry markers found in Lean proofs"
            exit 1
          fi

  coq:
    name: "Coq (8 files, 43 theorems)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Coq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq coq

      - name: Build Coq proofs
        working-directory: formal/coq
        run: |
          coq_makefile -f _CoqProject -o CoqMakefile
          make -f CoqMakefile

      - name: Verify no Admitted markers
        working-directory: formal/coq
        run: |
          if grep -rn 'Admitted' Vellaveto/*.v; then
            echo "FAIL: Admitted markers found in Coq proofs"
            exit 1
          fi

  kani:
    name: "Kani (${{ matrix.label }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "shard 1/4"
            shard_index: 0
            shard_count: 4
          - label: "shard 2/4"
            shard_index: 1
            shard_count: 4
          - label: "shard 3/4"
            shard_index: 2
            shard_count: 4
          - label: "shard 4/4"
            shard_index: 3
            shard_count: 4
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Kani
        run: |
          KANI_VERSION="0.67.0"
          cargo install --locked kani-verifier --version "${KANI_VERSION}"
          cargo kani setup

      - name: Verify extracted code correspondence (unit tests)
        working-directory: formal/kani
        run: |
          echo "=== Running Kani production parity unit tests (141 tests) ==="
          echo "These tests verify extracted algorithms match production behavior."
          cargo test --lib

      - name: Verify extraction sync
        run: RUN_KANI_PARITY_TESTS=0 bash formal/tools/check-kani-parity.sh

      - name: Run Kani proofs (${{ matrix.label }})
        run: bash formal/tools/run-kani-shard.sh "${{ matrix.shard_index }}" "${{ matrix.shard_count }}"

  verus:
    name: "Verus (20 kernels, 321 verified items)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust toolchain for Verus
        run: rustup install 1.93.1-x86_64-unknown-linux-gnu

      - name: Download Verus binary release
        run: |
          set -euo pipefail
          VERUS_VERSION="0.2026.03.01.25809cb"
          VERUS_SHA256="2af942e6919b203b1732d1176817abd09e66fe890fc8021a4aa8e2aac7f7cbb1"
          curl -fsSL --retry 3 --retry-delay 2 -o verus.zip \
            "https://github.com/verus-lang/verus/releases/download/release/${VERUS_VERSION}/verus-${VERUS_VERSION}-x86-linux.zip"
          echo "${VERUS_SHA256}  verus.zip" | sha256sum -c -
          unzip -q verus.zip -d verus-bin
          chmod +x verus-bin/verus-x86-linux/verus verus-bin/verus-x86-linux/cargo-verus

      - name: Verify Verus proof target parity
        run: |
          bash formal/tools/check-verus-parity.sh

      - name: Run canonical Verus verification
        run: |
          FORMAL_USE_CARGO_VERUS=1 \
          CARGO_VERUS_BIN=verus-bin/verus-x86-linux/cargo-verus \
          VERUS_BIN=verus-bin/verus-x86-linux/verus \
            bash formal/tools/verify-verus.sh
