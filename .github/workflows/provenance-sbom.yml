name: Provenance and SBOM

on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provenance-and-sbom:
    name: Build Provenance and SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Verify lockfile immutability
        run: |
          cargo metadata --locked --format-version=1 > /dev/null
          git diff --exit-code -- Cargo.lock

      - name: Build release artifacts
        run: cargo build --release --workspace --locked

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-release-assets: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: vellaveto-sbom
          path: sbom.cdx.json
          if-no-files-found: error

      - name: Attest release binaries provenance
        if: ${{ github.event.repository.private == false || vars.ENABLE_ATTESTATIONS == 'true' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            target/release/vellaveto
            target/release/vellaveto-proxy
            target/release/vellaveto-http-proxy

      - name: Skip attestation on private repositories
        if: ${{ github.event.repository.private == true && vars.ENABLE_ATTESTATIONS != 'true' }}
        run: |
          echo "Attestations are unavailable for private user-owned repositories."
          echo "Set ENABLE_ATTESTATIONS=true once repository settings support this feature."

      - name: Verify provenance attestations
        if: ${{ github.event.repository.private == false || vars.ENABLE_ATTESTATIONS == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for artifact in \
            target/release/vellaveto \
            target/release/vellaveto-proxy \
            target/release/vellaveto-http-proxy; do
            if [ ! -f "$artifact" ]; then
              echo "::error::Expected build artifact missing: $artifact"
              exit 1
            fi
            gh attestation verify "$artifact" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/provenance-sbom.yml" \
              --source-ref "${GITHUB_REF}" \
              --deny-self-hosted-runners \
              >/dev/null
          done
