name: Provenance and SBOM

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  attestations: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provenance-and-sbom:
    name: Build Provenance and SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Verify lockfile immutability
        run: |
          cargo metadata --locked --format-version=1 > /dev/null
          git diff --exit-code -- Cargo.lock

      - name: Build release artifacts
        run: cargo build --release --workspace --locked

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@28d71544de8eaf1b958d335707167c5f783590ad # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: sentinel-sbom
          path: sbom.cdx.json
          if-no-files-found: error

      - name: Attest release binaries provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            target/release/sentinel
            target/release/sentinel-proxy
            target/release/sentinel-http-proxy

      - name: Verify provenance attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for artifact in \
            target/release/sentinel \
            target/release/sentinel-proxy \
            target/release/sentinel-http-proxy; do
            if [ ! -f "$artifact" ]; then
              echo "::error::Expected build artifact missing: $artifact"
              exit 1
            fi
            gh attestation verify "$artifact" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/provenance-sbom.yml" \
              --source-ref "${GITHUB_REF}" \
              --deny-self-hosted-runners \
              >/dev/null
          done
