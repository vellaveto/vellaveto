name: Docker Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "examples/**"
      - "vellaveto-types/**"
      - "vellaveto-engine/**"
      - "vellaveto-audit/**"
      - "vellaveto-config/**"
      - "vellaveto-canonical/**"
      - "vellaveto-mcp/**"
      - "vellaveto-discovery/**"
      - "vellaveto-cluster/**"
      - "vellaveto-approval/**"
      - "vellaveto-server/**"
      - "vellaveto-proxy/**"
      - "vellaveto-http-proxy/**"
      - "vellaveto-tls/**"
      - ".github/workflows/docker-publish.yml"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "examples/**"
      - "vellaveto-types/**"
      - "vellaveto-engine/**"
      - "vellaveto-audit/**"
      - "vellaveto-config/**"
      - "vellaveto-canonical/**"
      - "vellaveto-mcp/**"
      - "vellaveto-discovery/**"
      - "vellaveto-cluster/**"
      - "vellaveto-approval/**"
      - "vellaveto-server/**"
      - "vellaveto-proxy/**"
      - "vellaveto-http-proxy/**"
      - "vellaveto-tls/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy scan results
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
