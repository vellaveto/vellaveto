name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  CARGO_INCREMENTAL: 0

jobs:
  # ───────────────────────────────────────────────────────
  # 1. Fast checks: format, lint, compile
  # ───────────────────────────────────────────────────────
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Format
        run: cargo fmt --all -- --check

      - name: Verify lockfile immutability
        run: |
          cargo metadata --locked --format-version=1 > /dev/null
          git diff --exit-code -- Cargo.lock

      - name: Check
        run: cargo check --workspace --all-targets --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Reject unwrap()/expect() in library code
        run: |
          # Scan library source for .unwrap() and .expect() calls.
          # Excludes: main.rs, *_tests.rs (path-included test modules),
          # #[cfg(test)] blocks, and doc comments (//! and ///).
          HITS=$(find sentinel-*/src/ -name '*.rs' -not -name 'main.rs' -not -name '*_tests.rs' \
            | xargs awk 'FNR==1 { skip=0 }
              /^#\[cfg\(test\)\]/ { skip=1 }
              skip==0 && /^[[:space:]]*(\/\/!|\/\/\/)/ { next }
              skip==0 && /\.unwrap\(\)/ { printf "%s:%d: %s\n", FILENAME, FNR, $0; found=1 }
              skip==0 && /\.expect\(/ { printf "%s:%d: %s\n", FILENAME, FNR, $0; found=1 }
              END { exit found ? 1 : 0 }' 2>&1) || {
            echo "::error::Found unwrap()/expect() in library code (see below)"
            echo "$HITS"
            exit 1
          }

  # ───────────────────────────────────────────────────────
  # 2. Sentinel types contract gate
  # ───────────────────────────────────────────────────────
  sentinel-types-contract:
    name: Sentinel Types Contract Gate
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Detect sentinel-types contract-impacting changes
        id: contract_changes
        run: |
          set -euo pipefail
          ZERO_SHA=0000000000000000000000000000000000000000
          BASE_SHA=

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "$ZERO_SHA" ]; then
            echo "No usable base SHA found; running contract checks."
            echo "run_contract=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$BASE_SHA"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" || true)"
          echo "Changed files between $BASE_SHA and ${{ github.sha }}:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -Eq '^(sentinel-types/|Cargo\.toml$|Cargo\.lock$)'; then
            echo "run_contract=true" >> "$GITHUB_OUTPUT"
            echo "sentinel-types contract-impacting files changed."
          else
            echo "run_contract=false" >> "$GITHUB_OUTPUT"
            echo "No sentinel-types contract-impacting changes detected."
          fi

      - name: Run sentinel-types contract checks
        if: steps.contract_changes.outputs.run_contract == 'true'
        run: |
          cargo test -p sentinel-types --locked
          cargo test -p sentinel-engine --locked
          cargo test -p sentinel-config --locked
          cargo test -p sentinel-mcp --locked
          cargo test -p sentinel-server --locked
          cargo test -p sentinel-http-proxy --locked
          cargo test -p sentinel-integration --locked

      - name: Sentinel-types contract checks skipped
        if: steps.contract_changes.outputs.run_contract != 'true'
        run: echo "Skipping sentinel-types contract checks."

  # ───────────────────────────────────────────────────────
  # 3. Full test suite
  # ───────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Run tests
        run: cargo test --workspace --no-fail-fast --locked

      - name: Build docs (verify no broken links)
        run: cargo doc --workspace --no-deps --locked

  # ───────────────────────────────────────────────────────
  # 4. Security audit
  # ───────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ───────────────────────────────────────────────────────
  # 5. Fuzz target compilation check
  # ───────────────────────────────────────────────────────
  fuzz:
    name: Fuzz Targets Compile
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: fuzz -> target
          cache-on-failure: true

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Check fuzz targets compile
        working-directory: fuzz
        run: cargo +nightly check --all-targets --locked

  # ───────────────────────────────────────────────────────
  # 6. Benchmark regression gate (push to main only)
  # ───────────────────────────────────────────────────────
  bench:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Restore benchmark baseline
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: target/criterion
          key: bench-baseline-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: bench-baseline-${{ runner.os }}-

      - name: Run benchmarks
        run: cargo bench --workspace --locked

      - name: Save benchmark baseline
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: target/criterion
          key: bench-baseline-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

  # ───────────────────────────────────────────────────────
  # 7. Release build (verify LTO and stripped binary)
  # ───────────────────────────────────────────────────────
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Build release binaries
        run: cargo build --release --workspace --locked

      - name: Check binary sizes
        run: |
          echo "=== Release binary sizes ==="
          ls -lh target/release/sentinel-server target/release/sentinel-proxy target/release/sentinel-http-proxy 2>/dev/null || true
          # Fail if any binary exceeds 50MB (signal of accidental debug info or bloat)
          for bin in target/release/sentinel-server target/release/sentinel-proxy target/release/sentinel-http-proxy; do
            if [ -f "$bin" ]; then
              SIZE=$(stat --printf="%s" "$bin")
              MAX=$((50 * 1024 * 1024))
              if [ "$SIZE" -gt "$MAX" ]; then
                echo "::error::$bin is $(($SIZE / 1024 / 1024))MB — exceeds 50MB limit"
                exit 1
              fi
              echo "$bin: $(($SIZE / 1024 / 1024))MB — OK"
            fi
          done
