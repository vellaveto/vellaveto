name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "site/**"
      - "sdk/**"
      - "helm/**"
      - "*.md"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "site/**"
      - "sdk/**"
      - "helm/**"
      - "*.md"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  CARGO_INCREMENTAL: 0

jobs:
  # ───────────────────────────────────────────────────────
  # 0. Validate external tool fingerprints
  # ───────────────────────────────────────────────────────
  actionlint-checksum:
    name: Validate actionlint digest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Validate release checksum
        run: |
          set -euo pipefail
          source tools/actionlint-release.env
          ACTIONLINT_VERSION=${ACTIONLINT_VERSION:?}
          ACTIONLINT_SHA256=${ACTIONLINT_SHA256:?}
          URL="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o /tmp/actionlint.tgz "$URL"
          SHA=$(sha256sum /tmp/actionlint.tgz | awk '{print $1}')
          if [ "$SHA" != "$ACTIONLINT_SHA256" ]; then
            echo "::error::actionlint checksum mismatch for version ${ACTIONLINT_VERSION}"
            exit 1
          fi

  # ───────────────────────────────────────────────────────
  # 1. Fast checks: format, lint, compile
  # ───────────────────────────────────────────────────────
  check:
    name: Check & Lint
    needs: actionlint-checksum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Install actionlint
        run: |
          set -euo pipefail
          source tools/actionlint-release.env
          ACTIONLINT_VERSION=${ACTIONLINT_VERSION:?}
          ACTIONLINT_SHA256=${ACTIONLINT_SHA256:?}
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/actionlint.tgz
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tgz" | sha256sum -c -
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          mkdir -p "$HOME/.local/bin"
          install -m 0755 /tmp/actionlint "$HOME/.local/bin/actionlint"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Lint GitHub workflows
        run: actionlint .github/workflows/*.yml

      - name: Format
        run: cargo fmt --all -- --check

      - name: Verify lockfile immutability
        run: |
          cargo metadata --locked --format-version=1 > /dev/null
          git diff --exit-code -- Cargo.lock

      - name: Guard zk-audit feature stays opt-in
        run: |
          set -euo pipefail
          if cargo tree --workspace --locked -e features | rg -q 'vellaveto-audit feature "zk-audit"'; then
            echo "::error::vellaveto-audit/zk-audit must not be enabled by default."
            exit 1
          fi

      - name: Check
        run: cargo check --workspace --all-targets --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings -A clippy::uninlined_format_args -A clippy::field_reassign_with_default -A clippy::const_is_empty -A clippy::unnecessary_literal_unwrap -A clippy::assertions_on_constants

      - name: Reject unwrap()/expect() in library code
        run: |
          # Scan library source for .unwrap() and .expect() calls.
          # Excludes: main.rs, tests.rs, *_tests.rs (test modules),
          # kani_proofs.rs (Kani harnesses gated behind #[cfg(kani)]),
          # #[cfg(test)] blocks, and doc comments (//! and ///).
          # shellcheck disable=SC2016
          HITS=$(find vellaveto-*/src/ -name '*.rs' -not -name 'main.rs' -not -name 'tests.rs' -not -name '*_tests.rs' -not -name 'kani_proofs.rs' -print0 \
            | xargs -0 awk 'FNR==1 { skip=0 }
              /^#\[cfg\(test\)\]/ { skip=1 }
              /^#\[cfg\(all\(test,/ { skip=1 }
              skip==0 && /^[[:space:]]*(\/\/!|\/\/\/)/ { next }
              skip==0 && /\.unwrap\(\)/ { printf "%s:%d: %s\n", FILENAME, FNR, $0; found=1 }
              skip==0 && /\.expect\(/ { printf "%s:%d: %s\n", FILENAME, FNR, $0; found=1 }
              END { exit found ? 1 : 0 }' 2>&1) || {
            echo "::error::Found unwrap()/expect() in library code (see below)"
            echo "$HITS"
            exit 1
          }

      - name: Reject panic! in library code
        run: |
          # Scan library source for panic! in non-test code paths.
          # Excludes: main.rs, tests.rs, *_tests.rs, kani_proofs.rs
          # (Kani harnesses use panic! for assertion and are gated
          # behind #[cfg(kani)]), #[cfg(test)] sections, and comments.
          # shellcheck disable=SC2016
          HITS=$(find vellaveto-*/src/ -name '*.rs' -not -name 'main.rs' -not -name 'tests.rs' -not -name '*_tests.rs' -not -name 'kani_proofs.rs' -print0 \
            | xargs -0 awk 'FNR==1 { skip=0 }
              /^#\[cfg\(test\)\]/ { skip=1 }
              /^#\[cfg\(all\(test,/ { skip=1 }
              skip==0 && /^[[:space:]]*\/\// { next }
              skip==0 && /panic!\(/ { printf "%s:%d: %s\n", FILENAME, FNR, $0; found=1 }
              END { exit found ? 1 : 0 }' 2>&1) || {
            echo "::error::Found panic! in library code (see below)"
            echo "$HITS"
            exit 1
          }

      - name: Reject unwrap()/expect()/panic! in build.rs
        run: |
          # Treat build scripts like runtime code: no panic-prone helpers.
          # shellcheck disable=SC2016
          HITS=$(find vellaveto-*/ -maxdepth 1 -name 'build.rs' -print0 \
            | xargs -0 -r awk '
              /^[[:space:]]*\/\// { next }
              /\.unwrap\(\)/ { printf "%s:%d: %s\n", FILENAME, FNR, $0; found=1 }
              /\.expect\(/ { printf "%s:%d: %s\n", FILENAME, FNR, $0; found=1 }
              /panic!\(/ { printf "%s:%d: %s\n", FILENAME, FNR, $0; found=1 }
              END { exit found ? 1 : 0 }' 2>&1) || {
            echo "::error::Found unwrap()/expect()/panic! in build.rs (see below)"
            echo "$HITS"
            exit 1
          }

      - name: Require SPDX license headers
        run: |
          MISSING=$(find vellaveto-*/src/ -name '*.rs' -print0 \
            | xargs -0 grep -rL 'SPDX-License-Identifier' || true)
          if [ -n "$MISSING" ]; then
            echo "::error::Files missing SPDX-License-Identifier header:"
            echo "$MISSING"
            exit 1
          fi

  # ───────────────────────────────────────────────────────
  # 2. Vellaveto types contract gate
  # ───────────────────────────────────────────────────────
  vellaveto-types-contract:
    name: Vellaveto Types Contract Gate
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Detect vellaveto-types contract-impacting changes
        id: contract_changes
        run: |
          set -euo pipefail
          ZERO_SHA=0000000000000000000000000000000000000000
          BASE_SHA=

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "$ZERO_SHA" ]; then
            echo "No usable base SHA found; running contract checks."
            echo "run_contract=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$BASE_SHA"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" || true)"
          echo "Changed files between $BASE_SHA and ${{ github.sha }}:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -Eq '^(vellaveto-types/|Cargo\.toml$|Cargo\.lock$)'; then
            echo "run_contract=true" >> "$GITHUB_OUTPUT"
            echo "vellaveto-types contract-impacting files changed."
          else
            echo "run_contract=false" >> "$GITHUB_OUTPUT"
            echo "No vellaveto-types contract-impacting changes detected."
          fi

      - name: Run vellaveto-types contract checks
        if: steps.contract_changes.outputs.run_contract == 'true'
        run: |
          cargo test -p vellaveto-types --locked
          cargo test -p vellaveto-engine --locked
          cargo test -p vellaveto-config --locked
          cargo test -p vellaveto-mcp --locked
          cargo test -p vellaveto-server --locked
          cargo test -p vellaveto-http-proxy --locked
          cargo test -p vellaveto-integration --locked

      - name: Vellaveto-types contract checks skipped
        if: steps.contract_changes.outputs.run_contract != 'true'
        run: echo "Skipping vellaveto-types contract checks."

  # ───────────────────────────────────────────────────────
  # 3. Full test suite
  # ───────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Run tests
        run: cargo test --workspace --no-fail-fast --locked

      - name: Build docs (verify no broken links)
        run: cargo doc --workspace --no-deps --locked

  # ───────────────────────────────────────────────────────
  # 4. Feature-gated critical paths
  # ───────────────────────────────────────────────────────
  feature-gates:
    name: Feature Gates
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: MCP A2A feature path
        run: cargo test -p vellaveto-mcp --features a2a --locked

      - name: Server Redis backend feature path
        run: cargo test -p vellaveto-server --features redis-backend --locked

  # ───────────────────────────────────────────────────────
  # 5. Security audit
  # ───────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          RUSTUP_TOOLCHAIN: stable

  # ───────────────────────────────────────────────────────
  # 6. Fuzz target compilation check
  # ───────────────────────────────────────────────────────
  fuzz:
    name: Fuzz Targets Compile
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: fuzz -> target
          cache-on-failure: true

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Check fuzz targets compile
        working-directory: fuzz
        run: cargo +nightly check --all-targets

  # ───────────────────────────────────────────────────────
  # 7. Benchmark regression gate (push to main only)
  # ───────────────────────────────────────────────────────
  bench:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Restore benchmark baseline
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: target/criterion
          key: bench-baseline-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: bench-baseline-${{ runner.os }}-

      - name: Run benchmarks
        run: |
          set -euo pipefail
          # CI smoke benchmark mode: run Criterion targets directly to avoid
          # forwarding `--quick` to non-Criterion test harnesses.
          run_bench() {
            local pkg="$1"
            local bench="$2"
            cargo bench -p "$pkg" --bench "$bench" --locked -- --quick || {
              echo "First benchmark run failed for ${pkg}/${bench}; retrying once..."
              cargo bench -p "$pkg" --bench "$bench" --locked -- --quick
            }
          }

          run_bench_with_features() {
            local pkg="$1"
            local bench="$2"
            local features="$3"
            cargo bench -p "$pkg" --bench "$bench" --features "$features" --locked -- --quick || {
              echo "First benchmark run failed for ${pkg}/${bench} (features=${features}); retrying once..."
              cargo bench -p "$pkg" --bench "$bench" --features "$features" --locked -- --quick
            }
          }

          run_bench vellaveto-audit audit
          run_bench vellaveto-engine evaluation
          run_bench vellaveto-engine e2e_pipeline
          run_bench vellaveto-http-proxy http_proxy
          run_bench vellaveto-mcp inspection
          run_bench vellaveto-mcp rug_pull
          run_bench_with_features vellaveto-mcp semantic semantic-detection

      - name: Save benchmark baseline
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: target/criterion
          key: bench-baseline-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

  # ───────────────────────────────────────────────────────
  # 7. Release build (verify LTO and stripped binary)
  # ───────────────────────────────────────────────────────
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Build release binaries
        run: cargo build --release --workspace --locked

      - name: Check binary sizes
        run: |
          set -euo pipefail
          bins=(
            target/release/vellaveto
            target/release/vellaveto-proxy
            target/release/vellaveto-http-proxy
          )

          echo "=== Release binary sizes ==="
          ls -lh "${bins[@]}"

          # Fail if any binary exceeds 50MB (signal of accidental debug info or bloat)
          max_bytes=$((50 * 1024 * 1024))
          for bin in "${bins[@]}"; do
            if [ ! -f "$bin" ]; then
              echo "::error::Expected release binary missing: $bin"
              exit 1
            fi

            size=$(stat --printf="%s" "$bin")
            if [ "$size" -gt "$max_bytes" ]; then
              echo "::error::$bin is $((size / 1024 / 1024))MB — exceeds 50MB limit"
              exit 1
            fi

            echo "$bin: $((size / 1024 / 1024))MB — OK"
          done

  # ───────────────────────────────────────────────────────
  # 8. Supply chain audit (cargo-vet with cargo-deny fallback)
  # ───────────────────────────────────────────────────────
  supply-chain-audit:
    name: Supply Chain Audit (cargo-vet)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Install cargo-vet
        run: cargo install cargo-vet --locked

      - name: Run supply chain audit
        run: |
          if [ ! -f supply-chain/config.toml ] || [ ! -f supply-chain/audits.toml ]; then
            echo "No cargo-vet policy found at supply-chain/{config,audits}.toml; falling back to cargo-deny."
            cargo install cargo-deny --locked
            cargo deny --locked check advisories bans sources licenses
            exit 0
          fi
          cargo vet --locked

  # ───────────────────────────────────────────────────────
  # 9. Semver compatibility check (PR only)
  # ───────────────────────────────────────────────────────
  semver-check:
    name: Semver Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # No workspace crates are published to crates.io yet
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Check for semver violations
        run: cargo semver-checks check-release --exclude mcpsec

  # ───────────────────────────────────────────────────────
  # 10a. Coq formal verification
  # ───────────────────────────────────────────────────────
  coq-verification:
    name: Coq Formal Proofs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Coq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends coq

      - name: Build Coq proofs
        working-directory: formal/coq
        run: make

      - name: Reject Admitted/admit in proofs
        run: |
          set -euo pipefail
          HITS=$(grep -rn 'Admitted\|[^a-zA-Z]admit[^a-zA-Z]\|[^a-zA-Z]admit$' formal/coq/Vellaveto/*.v || true)
          if [ -n "$HITS" ]; then
            echo "::error::Found Admitted/admit in Coq proofs (incomplete proofs):"
            echo "$HITS"
            exit 1
          fi
          echo "All Coq proofs complete — no Admitted/admit found."

  # ───────────────────────────────────────────────────────
  # 10. MSRV check (minimum supported Rust version)
  # ───────────────────────────────────────────────────────
  msrv-check:
    name: MSRV (1.88.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Check workspace compiles on MSRV
        run: cargo check --workspace --locked

  # ───────────────────────────────────────────────────────
  # 11. Feature flag matrix testing
  # ───────────────────────────────────────────────────────
  feature-matrix:
    name: "Features: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            cargo_args: "--workspace --locked"
          - name: discovery only
            cargo_args: "-p vellaveto-server --no-default-features --features discovery --locked"
          - name: projector only
            cargo_args: "-p vellaveto-server --no-default-features --features projector --locked"
          - name: zk-audit
            cargo_args: "-p vellaveto-audit --features zk-audit --locked"
          - name: all features
            cargo_args: "-p vellaveto-server --features discovery,projector -p vellaveto-audit --features zk-audit --locked"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: "Test: ${{ matrix.name }}"
        run: cargo test ${{ matrix.cargo_args }}
