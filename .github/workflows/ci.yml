name: CI
on:
  push:
    branches: [main]
  pull_request:
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --workspace --all-targets
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Format
        run: cargo fmt --all -- --check
      - name: Test
        run: cargo test --workspace --no-fail-fast
      - name: Doc
        run: cargo doc --workspace --no-deps
      - name: Security Audit
        run: cargo install cargo-audit && cargo audit
      - name: Reject unwrap()/expect() in library code
        run: |
          # Scan library source (excluding main.rs and #[cfg(test)] modules) for
          # .unwrap() and .expect() calls. Fails the build if any are found.
          HITS=$(find sentinel-*/src/ -name '*.rs' -not -name 'main.rs' \
            | xargs awk 'FNR==1 { skip=0 }
              /^#\[cfg\(test\)\]/ { skip=1 }
              skip==0 && /\.unwrap\(\)/ { printf "%s:%d: %s\n", FILENAME, FNR, $0; found=1 }
              skip==0 && /\.expect\(/ { printf "%s:%d: %s\n", FILENAME, FNR, $0; found=1 }
              END { exit found ? 1 : 0 }' 2>&1) || {
            echo "::error::Found unwrap()/expect() in library code (see below)"
            echo "$HITS"
            exit 1
          }
