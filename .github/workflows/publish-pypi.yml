name: Publish Python SDK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for trusted publishing

jobs:
  test:
    name: Test Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd sdk/python
          pip install --require-hashes --no-deps -r requirements-dev.txt
          pip install --no-deps -e .

      - name: Run tests
        run: |
          cd sdk/python
          pytest tests/ -v --tb=short

      - name: Type check
        if: matrix.python-version == '3.11'
        continue-on-error: true
        run: |
          cd sdk/python
          mypy vellaveto/ --ignore-missing-imports

      - name: Lint
        if: matrix.python-version == '3.11'
        continue-on-error: true
        run: |
          cd sdk/python
          ruff check vellaveto/

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/vellaveto-sdk
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --require-hashes --no-deps -r sdk/python/requirements-build.txt

      - name: Build package
        run: |
          cd sdk/python
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: sdk/python/dist/
          # Uses trusted publishing (OIDC) - configure at pypi.org/manage/project/vellaveto-sdk/settings/publishing/
