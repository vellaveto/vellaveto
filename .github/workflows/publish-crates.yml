name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        type: boolean
        default: true

# Requires CARGO_REGISTRY_TOKEN secret configured in repository settings
# Get token from: https://crates.io/settings/tokens

permissions:
  contents: read

jobs:
  publish:
    name: Publish Workspace Crates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Run tests before publish
        run: cargo test --workspace --locked

      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          DRY_RUN="${{ inputs.dry_run }}"
          FLAGS=""
          if [ "$DRY_RUN" = "true" ]; then
            FLAGS="--dry-run"
            echo "=== DRY RUN MODE ==="
          fi

          # Publish in dependency order (leaves first)
          CRATES=(
            sentinel-types
            sentinel-canonical
            sentinel-config
            sentinel-engine
            sentinel-audit
            sentinel-approval
            sentinel-mcp
            sentinel-cluster
            sentinel-server
            sentinel-http-proxy
            sentinel-proxy
          )

          for crate in "${CRATES[@]}"; do
            echo "--- Publishing $crate ---"
            cargo publish -p "$crate" $FLAGS --locked || {
              echo "Failed to publish $crate"
              exit 1
            }
            if [ "$DRY_RUN" != "true" ]; then
              echo "Waiting for crates.io index update..."
              sleep 30
            fi
          done

          echo "=== All crates published successfully ==="
