{{- if .Values.statefulSet.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vellaveto.fullname" . }}
  labels:
    {{- include "vellaveto.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "vellaveto.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vellaveto.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "vellaveto.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vellaveto.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: config-check
          image: {{ include "vellaveto.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - check
            - --config
            - /etc/vellaveto/config.toml
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/vellaveto
              readOnly: true
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "vellaveto.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --config
            - /etc/vellaveto/config.toml
            - --bind
            - "0.0.0.0:{{ .Values.service.port }}"
          env:
            - name: RUST_LOG
              value: {{ .Values.vellaveto.logLevel }}
            - name: VELLAVETO_STRICT_MODE
              value: "{{ .Values.vellaveto.strictMode }}"
            - name: VELLAVETO_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- with .Values.vellaveto.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.grpc.enabled }}
            - name: grpc
              containerPort: {{ .Values.grpc.port }}
              protocol: TCP
            {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/vellaveto
              readOnly: true
            - name: data
              mountPath: /var/lib/vellaveto
            - name: tmp
              mountPath: /tmp
        {{- if .Values.logShipping.enabled }}
        - name: log-shipper
          image: {{ .Values.logShipping.image }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/vellaveto
              readOnly: true
            - name: log-shipper-config
              mountPath: /fluent-bit/etc
              readOnly: true
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "vellaveto.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        {{- if .Values.logShipping.enabled }}
        - name: log-shipper-config
          configMap:
            name: {{ include "vellaveto.fullname" . }}-log-shipper
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.statefulSet.persistence.accessMode | default "ReadWriteOnce" }}
        {{- if .Values.statefulSet.persistence.storageClass }}
        storageClassName: {{ .Values.statefulSet.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.statefulSet.persistence.size | default "1Gi" }}
{{- end }}
