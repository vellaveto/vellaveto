# Default values for Vellaveto Helm chart
# Override these in your own values file or via --set flags

# Replica count for the Deployment
replicaCount: 1

# Container image configuration
image:
  repository: ghcr.io/vellaveto/vellaveto
  pullPolicy: IfNotPresent
  # Overrides the image tag (default: Chart appVersion)
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  # Create a service account
  create: true
  # Annotations for the service account
  annotations: {}
  # Name of the service account (auto-generated if empty)
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Container security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Service configuration
service:
  type: ClusterIP
  port: 3000

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: vellaveto.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: vellaveto-tls
  #    hosts:
  #      - vellaveto.local

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Network policy (restricts pod traffic)
networkPolicy:
  enabled: false
  # Namespaces allowed to reach Vellaveto (empty = all)
  allowedNamespaces: []
  # CIDRs allowed for egress (e.g., external APIs)
  allowedEgressCIDRs: []

# Pod disruption budget (availability during upgrades)
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1  # alternative to minAvailable

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Vellaveto configuration
vellaveto:
  # Logging level (trace, debug, info, warn, error)
  logLevel: info

  # Enable strict mode (unknown tools denied by default)
  strictMode: true

  # Injection scanning configuration
  injection:
    enabled: true
    blocking: false
    # Extra patterns to detect
    extraPatterns: []
    # Patterns to disable from defaults
    disabledPatterns: []

  # DLP (Data Loss Prevention) configuration
  dlp:
    enabled: true
    blocking: false

  # Audit logging configuration
  audit:
    # Redaction level: Off, Low, High
    redactionLevel: "Low"
    # Path for audit logs (relative to /var/lib/vellaveto)
    logPath: "audit.log"

  # Policies to load (inline or from ConfigMap)
  policies: []
  # - id: "bash:*"
  #   name: "Deny bash commands"
  #   policy_type: "Deny"
  #   priority: 100

  # Extra environment variables
  extraEnv: []
  # - name: ANTHROPIC_API_KEY
  #   valueFrom:
  #     secretKeyRef:
  #       name: anthropic-secrets
  #       key: api-key

# StatefulSet mode (Phase 27)
# When enabled, replaces Deployment with StatefulSet + PVC for audit persistence.
statefulSet:
  enabled: false
  persistence:
    # Storage class (empty = cluster default)
    storageClass: ""
    # PVC size for audit log persistence
    size: 1Gi
    accessMode: ReadWriteOnce

# gRPC configuration (Phase 27)
grpc:
  enabled: false
  port: 50051

# WebSocket configuration (Phase 27)
websocket:
  enabled: false

# Log shipping sidecar (Phase 27)
logShipping:
  enabled: false
  image: fluent/fluent-bit:latest
  outputPlugin: stdout
  outputHost: ""
  outputPort: ""

# Deployment mode configuration (Phase 27)
deployment:
  # Mode: Standalone, Clustered, Kubernetes
  mode: Standalone
  # Override instance ID (default: HOSTNAME env var)
  instanceId: ""
  leaderElection:
    enabled: false
    leaseDurationSecs: 15
    renewIntervalSecs: 10
    retryPeriodSecs: 5
  serviceDiscovery:
    # Mode: Static, Dns, Kubernetes
    mode: Static
    # DNS name for DNS-based discovery (required when mode=Dns)
    dnsName: ""
    refreshIntervalSecs: 30

# Prometheus metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

# Kubernetes Operator (Phase 49)
# Manages VellavetoCluster, VellavetoPolicy, and VellavetoTenant CRDs.
operator:
  # Enable the operator deployment (default: disabled)
  enabled: false
  # Number of operator replicas (1 recommended — uses leader election)
  replicas: 1
  image:
    repository: ""  # defaults to image.repository + "-operator"
    tag: ""         # defaults to Chart.AppVersion
    pullPolicy: IfNotPresent
  # Log level for the operator
  logLevel: info
  # Resource limits
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  # Node selector (defaults to global nodeSelector)
  nodeSelector: {}
  # Tolerations (defaults to global tolerations)
  tolerations: []

# Health check probes
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
