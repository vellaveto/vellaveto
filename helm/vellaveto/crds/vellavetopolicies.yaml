apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vellavetopolicies.vellaveto.io
spec:
  group: vellaveto.io
  names:
    kind: VellavetoPolicy
    listKind: VellavetoPolicyList
    plural: vellavetopolicies
    singular: vellavetopolicy
    shortNames:
      - vp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Cluster
          type: string
          jsonPath: .spec.clusterRef
        - name: PolicyID
          type: string
          jsonPath: .spec.policy.id
        - name: Type
          type: string
          jsonPath: .spec.policy.policyType
        - name: Synced
          type: boolean
          jsonPath: .status.synced
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - clusterRef
                - policy
              properties:
                clusterRef:
                  type: string
                  maxLength: 253
                  description: Name of the target VellavetoCluster in the same namespace.
                policy:
                  type: object
                  required:
                    - id
                    - name
                    - policyType
                  properties:
                    id:
                      type: string
                      maxLength: 256
                      description: Unique policy identifier.
                    name:
                      type: string
                      maxLength: 512
                      description: Human-readable policy name.
                    policyType:
                      type: string
                      enum: ["Allow", "Deny", "Conditional"]
                      description: "Policy type: Allow, Deny, or Conditional."
                    priority:
                      type: integer
                      minimum: 0
                      default: 0
                      description: Evaluation priority (higher = evaluated first).
                    conditions:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                      description: Conditions for Conditional policy type (JSON object).
                    pathRules:
                      type: object
                      description: Path-based access control rules.
                      properties:
                        allowed:
                          type: array
                          items:
                            type: string
                          description: Glob patterns for allowed paths.
                        blocked:
                          type: array
                          items:
                            type: string
                          description: Glob patterns for blocked paths.
                    networkRules:
                      type: object
                      description: Network-based access control rules.
                      properties:
                        allowedDomains:
                          type: array
                          items:
                            type: string
                          description: Domain patterns for allowed destinations.
                        blockedDomains:
                          type: array
                          items:
                            type: string
                          description: Domain patterns for blocked destinations.
                        ipRules:
                          type: object
                          description: IP-level access control rules.
                          properties:
                            blockPrivate:
                              type: boolean
                              default: false
                              description: Block connections to private/reserved IPs.
                            blockedCidrs:
                              type: array
                              items:
                                type: string
                              description: CIDR ranges to block.
                            allowedCidrs:
                              type: array
                              items:
                                type: string
                              description: CIDR ranges to allow.
                lifecycle:
                  type: object
                  description: Optional lifecycle management configuration.
                  properties:
                    autoPromote:
                      type: boolean
                      default: false
                      description: Automatically promote through Draft -> Staging -> Active.
                    stagingPeriodSecs:
                      type: integer
                      minimum: 0
                      maximum: 2592000
                      description: Minimum staging period before promotion (seconds).
            status:
              type: object
              properties:
                synced:
                  type: boolean
                lastSyncTime:
                  type: string
                  format: date-time
                lastError:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                    required:
                      - type
                      - status
