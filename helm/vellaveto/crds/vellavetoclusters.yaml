apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vellavetoclusters.vellaveto.io
spec:
  group: vellaveto.io
  names:
    kind: VellavetoCluster
    listKind: VellavetoClusterList
    plural: vellavetoclusters
    singular: vellavetocluster
    shortNames:
      - vc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - replicas
                - image
              properties:
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 10
                  description: Number of Vellaveto server replicas.
                image:
                  type: string
                  maxLength: 512
                  description: Container image for the Vellaveto server.
                version:
                  type: string
                  maxLength: 128
                  description: Application version tag override.
                config:
                  type: object
                  description: Configuration overrides for the Vellaveto server.
                  properties:
                    security_mode:
                      type: string
                      enum: ["strict", "permissive", "audit"]
                      description: Security enforcement mode.
                    eu_ai_act_enabled:
                      type: boolean
                      description: Enable EU AI Act compliance.
                    dora_enabled:
                      type: boolean
                      description: Enable DORA compliance.
                    nis2_enabled:
                      type: boolean
                      description: Enable NIS2 compliance.
                    audit_enabled:
                      type: boolean
                      description: Enable audit logging.
                    rate_limit_rps:
                      type: integer
                      minimum: 1
                      description: Global rate limit (evaluations per second).
                resources:
                  type: object
                  description: Kubernetes resource requirements for Vellaveto pods.
                  properties:
                    cpu_request:
                      type: string
                      description: "CPU request (e.g. 100m)."
                    memory_request:
                      type: string
                      description: "Memory request (e.g. 128Mi)."
                    cpu_limit:
                      type: string
                      description: "CPU limit (e.g. 500m)."
                    memory_limit:
                      type: string
                      description: "Memory limit (e.g. 512Mi)."
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Running", "Failed"]
                replicas:
                  type: integer
                readyReplicas:
                  type: integer
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                    required:
                      - type
                      - status
