apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sentinel.fullname" . }}-config
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
data:
  config.toml: |
    # Sentinel Configuration
    # Generated by Helm chart

    # Injection scanning
    [injection]
    enabled = {{ .Values.sentinel.injection.enabled }}
    block_on_injection = {{ .Values.sentinel.injection.blocking }}
    {{- if .Values.sentinel.injection.extraPatterns }}
    extra_patterns = [{{ range $i, $p := .Values.sentinel.injection.extraPatterns }}{{ if $i }}, {{ end }}"{{ $p }}"{{ end }}]
    {{- end }}
    {{- if .Values.sentinel.injection.disabledPatterns }}
    disabled_patterns = [{{ range $i, $p := .Values.sentinel.injection.disabledPatterns }}{{ if $i }}, {{ end }}"{{ $p }}"{{ end }}]
    {{- end }}

    # DLP configuration
    [dlp]
    enabled = {{ .Values.sentinel.dlp.enabled }}
    blocking = {{ .Values.sentinel.dlp.blocking }}

    # Audit logging
    [audit]
    redaction_level = "{{ .Values.sentinel.audit.redactionLevel }}"

    # Policies
    {{- range .Values.sentinel.policies }}
    [[policies]]
    id = "{{ .id }}"
    name = "{{ .name }}"
    policy_type = "{{ .policy_type }}"
    priority = {{ .priority }}
    {{- if .path_rules }}
    [policies.path_rules]
    {{- if .path_rules.allowed }}
    allowed = [{{ range $i, $p := .path_rules.allowed }}{{ if $i }}, {{ end }}"{{ $p }}"{{ end }}]
    {{- end }}
    {{- if .path_rules.blocked }}
    blocked = [{{ range $i, $p := .path_rules.blocked }}{{ if $i }}, {{ end }}"{{ $p }}"{{ end }}]
    {{- end }}
    {{- end }}
    {{- if .network_rules }}
    [policies.network_rules]
    {{- if .network_rules.allowed_domains }}
    allowed_domains = [{{ range $i, $d := .network_rules.allowed_domains }}{{ if $i }}, {{ end }}"{{ $d }}"{{ end }}]
    {{- end }}
    {{- if .network_rules.blocked_domains }}
    blocked_domains = [{{ range $i, $d := .network_rules.blocked_domains }}{{ if $i }}, {{ end }}"{{ $d }}"{{ end }}]
    {{- end }}
    {{- end }}
    {{- end }}
