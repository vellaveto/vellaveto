[package]
name = "vellaveto-server"
version = "3.0.0"
edition = "2021"
license.workspace = true
repository.workspace = true
description = "Vellaveto policy engine — CLI and HTTP server"

[[bin]]
name = "vellaveto"
path = "src/main.rs"

[features]
default = ["discovery", "projector"]
redis-backend = ["vellaveto-cluster/redis-backend"]
observability-exporters = ["vellaveto-audit/observability-exporters"]
discovery = ["vellaveto-mcp/discovery"]
projector = ["vellaveto-mcp/projector"]
postgres-store = ["vellaveto-audit/postgres-store", "dep:sqlx"]

[dependencies]
vellaveto-types = { path = "../vellaveto-types" }
vellaveto-engine = { path = "../vellaveto-engine" }
vellaveto-audit = { path = "../vellaveto-audit" }
vellaveto-mcp = { path = "../vellaveto-mcp", features = ["discovery", "projector"] }
vellaveto-canonical = { path = "../vellaveto-canonical" }
vellaveto-config = { path = "../vellaveto-config" }
vellaveto-approval = { path = "../vellaveto-approval" }
vellaveto-cluster = { path = "../vellaveto-cluster" }

serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
anyhow = { workspace = true }

arc-swap = "1"
axum = "0.8"
clap = { version = "4.0", features = ["derive"] }
toml = "1.0"
tower-http = { version = "0.6", features = ["cors", "trace"] }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower = "0.5"
governor = "0.10"
subtle = "2"
uuid = { workspace = true }
jsonwebtoken = { version = "10", features = ["aws_lc_rs"] }
ed25519-dalek = { version = "2", features = ["rand_core"] }
hex = "0.4"
sha2 = "0.10"
notify = "8"
dashmap = "6"
percent-encoding = "2.3"
url = "2"
metrics = "0.24"
metrics-exporter-prometheus = "0.18"
# OpenTelemetry (Phase 4)
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true }
opentelemetry-otlp = { workspace = true }
opentelemetry-semantic-conventions = { workspace = true }
tracing-opentelemetry = { workspace = true }

# Phase 5: Enterprise Hardening
tokio-rustls = "0.26"
rustls = "0.23"
x509-parser = "0.18"
reqwest = { workspace = true }
# SECURITY: lru >= 0.16.3 required to fix RUSTSEC-2026-0002 (Stacked Borrows violation)
lru = "0.16"
# Phase 43: Centralized Audit Store (PostgreSQL backend)
sqlx = { workspace = true, optional = true }

async-trait.workspace = true
unicode-normalization = "0.1"
[dev-dependencies]
tempfile = "3.0"
