[package]
name = "vellaveto-server"
version = "6.0.0"
edition = "2021"
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true
description = "Vellaveto policy engine — CLI and HTTP server"

[[bin]]
name = "vellaveto"
path = "src/main.rs"

[features]
default = ["discovery", "projector", "opentelemetry"]
redis-backend = ["vellaveto-cluster/redis-backend"]
observability-exporters = ["vellaveto-audit/observability-exporters"]
discovery = ["vellaveto-mcp/discovery", "vellaveto-engine/discovery"]
projector = ["vellaveto-mcp/projector"]
postgres-store = ["vellaveto-audit/postgres-store", "dep:sqlx"]
opentelemetry = [
    "dep:opentelemetry",
    "dep:opentelemetry_sdk",
    "dep:opentelemetry-otlp",
    "dep:opentelemetry-semantic-conventions",
    "dep:tracing-opentelemetry",
]

[dependencies]
vellaveto-types = { path = "../vellaveto-types", version = "6.0.0" }
vellaveto-engine = { path = "../vellaveto-engine", version = "6.0.0" }
vellaveto-audit = { path = "../vellaveto-audit", version = "6.0.0" }
vellaveto-mcp = { path = "../vellaveto-mcp", version = "6.0.0", features = ["discovery", "projector"] }
vellaveto-canonical = { path = "../vellaveto-canonical", version = "6.0.0" }
vellaveto-config = { path = "../vellaveto-config", version = "6.0.0" }
vellaveto-approval = { path = "../vellaveto-approval", version = "6.0.0" }
vellaveto-cluster = { path = "../vellaveto-cluster", version = "6.0.0" }
vellaveto-discovery = { path = "../vellaveto-discovery", version = "6.0.0" }

serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
anyhow = { workspace = true }

arc-swap = "1"
axum = "0.8"
clap = { version = "4.0", features = ["derive"] }
toml = { workspace = true }
tower-http = { version = "0.6", features = ["cors", "trace"] }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower = "0.5"
governor = "0.10"
subtle = "2"
uuid = { workspace = true }
jsonwebtoken = { version = "10", features = ["aws_lc_rs"] }
ed25519-dalek = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true }
notify = "8"
dashmap = "6"
percent-encoding = { workspace = true }
url = { workspace = true }
metrics = "0.24"
metrics-exporter-prometheus = "0.18"
ring = "0.17"
# OpenTelemetry (Phase 4) — optional, feature-gated to avoid cmake build
# requirement for users who don't need OTLP export.
opentelemetry = { workspace = true, optional = true }
opentelemetry_sdk = { workspace = true, optional = true }
opentelemetry-otlp = { workspace = true, optional = true }
opentelemetry-semantic-conventions = { workspace = true, optional = true }
tracing-opentelemetry = { workspace = true, optional = true }

# Phase 5: Enterprise Hardening
tokio-rustls = "0.26"
rustls = "0.23"
x509-parser = "0.18"
reqwest = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
flate2 = { workspace = true, features = ["zlib"] }
roxmltree = "0.21"
# SECURITY: lru >= 0.16.3 required to fix RUSTSEC-2026-0002 (Stacked Borrows violation)
lru = "0.16"
# Phase 43: Centralized Audit Store (PostgreSQL backend)
sqlx = { workspace = true, optional = true }

async-trait.workspace = true
unicode-normalization = { workspace = true }
tokio-util = { workspace = true }
argon2 = { workspace = true }
password-hash = { workspace = true }
[dev-dependencies]
tempfile = "3.0"
