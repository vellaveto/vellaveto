[package]
name = "vellaveto-formal-verus"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
vstd = "=0.0.0-2026-03-01-0109"

[package.metadata.verus]
verify = true

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(verus_only)',
  'cfg(verus_keep_ghost)',
  'cfg(verus_keep_ghost_body)',
  'cfg(verus_verify_core)',
] }

[workspace]
