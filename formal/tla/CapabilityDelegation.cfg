\* CapabilityDelegation.cfg — TLC model checker configuration
\*
\* Bounded model checking for capability token delegation.
\* 3 principals, max depth 3, 6 tokens, 4 time values.
\*
\* Run: java -jar tla2tools.jar -config CapabilityDelegation.cfg MC_CapabilityDelegation.tla

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

\* --- Constants ---

CONSTANT
    Principals <- const_Principals
    MaxDepth <- const_MaxDepth
    MaxTokens <- const_MaxTokens
    TimeValues <- const_TimeValues

\* --- Safety Invariants ---

INVARIANT TypeOK
INVARIANT InvariantD1_MonotonicDepth
INVARIANT InvariantD2_DepthBounded
INVARIANT InvariantD3_TemporalMonotonicity
INVARIANT InvariantD4_IssuerChainIntegrity
INVARIANT InvariantD5_TerminalIsolation

\* --- Liveness ---

PROPERTY LivenessDL1_ChainTermination
