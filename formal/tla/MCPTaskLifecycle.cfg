\* MCPTaskLifecycle.cfg — TLC model checker configuration
\*
\* Bounded model checking for MCP Task primitive lifecycle.
\* 3 task IDs, max 2 concurrent tasks, 2 input rounds.
\*
\* Run: java -jar tla2tools.jar -config MCPTaskLifecycle.cfg MC_MCPTaskLifecycle.tla

SPECIFICATION Spec

\* --- Model values ---

CONSTANT
    tk1 = tk1
    tk2 = tk2
    tk3 = tk3

\* --- Constants ---

CONSTANT
    MaxTasks = 2
    MaxInputRounds = 2
    TaskIds <- const_TaskIds

\* --- Safety Invariants ---

INVARIANT TypeOK
INVARIANT InvariantT1_TerminalAbsorbing
INVARIANT InvariantT2_InitialState
INVARIANT InvariantT3_PolicyEvaluated
INVARIANT InvariantT4_TerminalAudited
INVARIANT InvariantT5_BoundedConcurrency

\* --- Liveness Properties ---

PROPERTY LivenessTL1_EventualTermination
PROPERTY LivenessTL2_InputResolved
