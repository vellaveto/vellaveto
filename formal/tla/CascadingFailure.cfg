\* CascadingFailure.cfg — TLC model checker configuration
\*
\* Bounded model checking for cascading failure circuit breaker.
\* 2 agents, 2 tools, chain depth 3, error threshold 2.
\*
\* Run: java -jar tla2tools.jar -config CascadingFailure.cfg MC_CascadingFailure.tla

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

\* Bound requestOutcomes to keep state space finite
CONSTRAINT StateConstraint

\* --- Model values ---

CONSTANT
    ag1 = ag1
    ag2 = ag2
    tool1 = tool1
    tool2 = tool2

\* --- Constants ---

CONSTANT
    MaxChainDepth = 3
    MaxErrors = 2
    Agents <- const_Agents
    Tools <- const_Tools

\* --- Safety Invariants ---

INVARIANT TypeOK
INVARIANT InvariantC1_ChainDepthBounded
INVARIANT InvariantC2_ErrorThresholdTriggersOpen
INVARIANT InvariantC3_OpenCircuitDenies
INVARIANT InvariantC4_HalfOpenTransient
INVARIANT InvariantC5_ProbeSuccessCloses

\* --- Liveness Properties ---

PROPERTY LivenessCL1_OpenEventuallyHalfOpen
PROPERTY LivenessCL2_HalfOpenResolves
