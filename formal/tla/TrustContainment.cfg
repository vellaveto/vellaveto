\* TrustContainment.cfg — TLC model checker configuration
\*
\* Bounded model checking for trust-tier lattice flow rules and privileged
\* sink containment. The model companion provides concrete edge-case
\* requests spanning verified, low-trust, unknown, and quarantined inputs.
\*
\* Run: formal/tools/run-tla-spec.sh TrustContainment

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

\* --- Constants ---

CONSTANT
    RequestSet <- const_RequestSet

\* --- Safety Invariants ---

INVARIANT TypeOK
INVARIANT InvariantTC1_AllowedPrivilegedFlowsRequireLineage
INVARIANT InvariantTC2_UpwardFlowsRequireDeclassification
INVARIANT InvariantTC3_UnknownOrQuarantinedPrivilegedFlowsNeedGate
INVARIANT InvariantTC4_JoinLeastUpperBound
INVARIANT InvariantTC5_MeetGreatestLowerBound
INVARIANT InvariantTC6_SinkThresholdsAreMonotonic

\* --- Liveness ---

PROPERTY LivenessTCL1_PendingRequestsEventuallyDrain
