\* WorkflowConstraint.cfg — TLC model checker configuration
\*
\* Bounded model checking for workflow DAG constraints.
\* 5 governed tools, 2 ungoverned, max history length 6.
\*
\* DAG: auth -> {read, list}, read -> {process}, list -> {process},
\*      process -> {write}
\*
\* Run: java -jar tla2tools.jar -config WorkflowConstraint.cfg WorkflowConstraint.tla

SPECIFICATION Spec
CHECK_DEADLOCK FALSE

\* --- Constants ---

CONSTANT
    GovernedTools = {"auth", "read", "list", "process", "write"}
    UngovernedTools = {"log", "trace"}
    EntryPoints = {"auth"}
    MaxHistoryLen = 6

\* --- Safety Invariants ---

INVARIANT TypeOK
INVARIANT InvariantS8_WorkflowPredecessor
INVARIANT InvariantS9_AcyclicDAG
