\* AbacForbidOverrides.cfg — TLC model checker configuration
\*
\* Bounded model checking with small state space.
\* 4 ABAC policies (incl. conditions=FALSE), 2 principals, 2 actions.
\*
\* Run: java -jar tla2tools.jar -config AbacForbidOverrides.cfg MC_AbacForbidOverrides.tla

SPECIFICATION Spec

\* --- Model values ---

CONSTANT
    t1 = t1
    t2 = t2
    f1 = f1
    f2 = f2
    wildcard = wildcard
    alice = alice
    bob = bob

\* Reuse MCPCommon constants for pattern matching
CONSTANT
    Tools = {t1, t2}
    Functions = {f1, f2}
    Paths = {}
    Domains = {}
    Wildcard = wildcard

CONSTANT
    Principals = {alice, bob}

\* AbacPolicySet and AbacActionSet are defined as operators in
\* MC_AbacForbidOverrides.tla because TLC cannot parse records in .cfg.
CONSTANT
    AbacPolicySet <- const_AbacPolicySet
    AbacActionSet <- const_AbacActionSet

\* --- Safety Invariants ---

INVARIANT TypeOK
INVARIANT InvariantS7_ForbidDominance
INVARIANT InvariantS8_ForbidIgnoresPriority
INVARIANT InvariantS9_PermitWithoutForbid
INVARIANT InvariantS10_NoMatchResult

\* --- Liveness Properties ---

PROPERTY LivenessAbacEventualDecision
