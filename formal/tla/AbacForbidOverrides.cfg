\* AbacForbidOverrides.cfg — TLC model checker configuration
\*
\* Bounded model checking with small state space.
\* 3 ABAC policies, 2 principals, 2 actions, effects = {Permit, Forbid}.
\*
\* Run: java -jar tla2tools.jar -config AbacForbidOverrides.cfg AbacForbidOverrides.tla

SPECIFICATION Spec

\* --- Constants ---

\* Reuse MCPCommon constants for pattern matching
CONSTANT
    Tools = {t1, t2}
    Functions = {f1, f2}
    Paths = {}
    Domains = {}
    Wildcard = wildcard

CONSTANT
    Principals = {alice, bob}

\* AbacPolicySet: 3 policies covering permit, forbid, and wildcard scenarios.
\*
\* Policy 1: High-priority permit for alice on t1/f1
\* Policy 2: Low-priority forbid for alice on t1 (any function) — tests S8
\* Policy 3: Permit for bob on t2/f2
CONSTANT
    AbacPolicySet = {
        [id |-> "abac1", principal |-> alice, action |-> t1, resource |-> f1,
         effect |-> "Permit", priority |-> 10, conditions |-> TRUE],
        [id |-> "abac2", principal |-> alice, action |-> t1, resource |-> wildcard,
         effect |-> "Forbid", priority |-> 1, conditions |-> TRUE],
        [id |-> "abac3", principal |-> bob, action |-> t2, resource |-> f2,
         effect |-> "Permit", priority |-> 5, conditions |-> TRUE]
    }

\* AbacActionSet: Representative actions for evaluation.
CONSTANT
    AbacActionSet = {
        [tool |-> t1, function |-> f1,
         target_paths |-> {}, target_domains |-> {},
         has_context |-> TRUE],
        [tool |-> t2, function |-> f2,
         target_paths |-> {}, target_domains |-> {},
         has_context |-> TRUE]
    }

\* --- Safety Invariants ---

INVARIANT TypeOK
INVARIANT InvariantS7_ForbidDominance
INVARIANT InvariantS8_ForbidIgnoresPriority
INVARIANT InvariantS9_PermitWithoutForbid
INVARIANT InvariantS10_NoMatchResult
