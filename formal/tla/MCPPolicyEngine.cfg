\* MCPPolicyEngine.cfg — TLC model checker configuration
\*
\* Bounded model checking with small state space.
\* 3 tools, 3 functions, 3 paths, 3 domains, 3 policies, 2 actions.
\*
\* Small bounds are sufficient because fail-closed and priority ordering
\* are structural properties: a counterexample with 3 policies also
\* applies at 300.
\*
\* Run: java -jar tla2tools.jar -config MCPPolicyEngine.cfg MCPPolicyEngine.tla

SPECIFICATION Spec

\* --- Constants ---

CONSTANT
    Tools = {t1, t2, t3}
    Functions = {f1, f2, f3}
    Paths = {p1, p2, p3}
    Domains = {d1, d2, d3}
    Wildcard = wildcard
    MaxPolicies = 3
    MaxActions = 2

\* PolicySet: Enumerated by TLC from the cross product of fields.
\* We use SYMMETRY to reduce the state space.
CONSTANT
    PolicySet = {
        [id |-> "pol1", priority |-> 10, type |-> "Deny",
         tool |-> wildcard, function |-> wildcard,
         blocked_paths |-> {p1}, allowed_paths |-> {},
         blocked_domains |-> {}, allowed_domains |-> {},
         on_no_match |-> "deny", requires_context |-> FALSE],
        [id |-> "pol2", priority |-> 5, type |-> "Allow",
         tool |-> t1, function |-> f1,
         blocked_paths |-> {}, allowed_paths |-> {p2, p3},
         blocked_domains |-> {}, allowed_domains |-> {d1, d2},
         on_no_match |-> "deny", requires_context |-> FALSE],
        [id |-> "pol3", priority |-> 5, type |-> "Conditional",
         tool |-> t2, function |-> wildcard,
         blocked_paths |-> {}, allowed_paths |-> {},
         blocked_domains |-> {d3}, allowed_domains |-> {},
         on_no_match |-> "continue", requires_context |-> TRUE]
    }

\* ActionSet: Representative actions covering key scenarios.
CONSTANT
    ActionSet = {
        [tool |-> t1, function |-> f1,
         target_paths |-> {p2}, target_domains |-> {d1},
         has_context |-> TRUE],
        [tool |-> t2, function |-> f2,
         target_paths |-> {p1}, target_domains |-> {d3},
         has_context |-> FALSE]
    }

\* --- Safety Invariants ---

INVARIANT TypeOK
INVARIANT InvariantS2_PriorityOrdering
INVARIANT InvariantS3_BlockedPathsOverride
INVARIANT InvariantS4_BlockedDomainsOverride
INVARIANT InvariantS5_ErrorsDeny
INVARIANT InvariantS6_MissingContextDeny

\* --- Liveness Properties ---

PROPERTY LivenessL1_EventualVerdict
PROPERTY LivenessL2_NoStuckStates
