\* MCPPolicyEngine.cfg — TLC model checker configuration
\*
\* Bounded model checking with small state space.
\* 3 tools, 3 functions, 3 paths, 3 domains, 3 policies, 2 actions.
\*
\* Small bounds are sufficient because fail-closed and priority ordering
\* are structural properties: a counterexample with 3 policies also
\* applies at 300.
\*
\* Run: java -jar tla2tools.jar -config MCPPolicyEngine.cfg MC_MCPPolicyEngine.tla

SPECIFICATION Spec

\* --- Model values ---

CONSTANT
    t1 = t1
    t2 = t2
    t3 = t3
    f1 = f1
    f2 = f2
    f3 = f3
    p1 = p1
    p2 = p2
    p3 = p3
    d1 = d1
    d2 = d2
    d3 = d3
    wildcard = wildcard

\* --- Constants ---

CONSTANT
    Tools = {t1, t2, t3}
    Functions = {f1, f2, f3}
    Paths = {p1, p2, p3}
    Domains = {d1, d2, d3}
    Wildcard = wildcard
    MaxPolicies = 3
    MaxActions = 2

\* PolicySet and ActionSet are defined as operators in MC_MCPPolicyEngine.tla
\* because TLC's .cfg parser cannot handle set-of-record literals.
CONSTANT
    PolicySet <- const_PolicySet
    ActionSet <- const_ActionSet

\* --- Safety Invariants ---

INVARIANT TypeOK
INVARIANT InvariantS1_FailClosed
INVARIANT InvariantS2_PriorityOrdering
INVARIANT InvariantS3_BlockedPathsOverride
INVARIANT InvariantS4_BlockedDomainsOverride
INVARIANT InvariantS5_ErrorsDeny
INVARIANT InvariantS6_MissingContextDeny

\* --- Liveness Properties ---

PROPERTY LivenessL1_EventualVerdict
PROPERTY LivenessL2_NoStuckStates
