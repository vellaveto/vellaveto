[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vellaveto-sdk"
version = "6.0.3"
description = "Python SDK for the Vellaveto agent interaction firewall"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.9"
authors = [
    { name = "Paolo Vella", email = "hello@vellaveto.online" }
]
keywords = [
    "vellaveto",
    "mcp",
    "security",
    "ai",
    "llm",
    "langchain",
    "langgraph",
    "agent",
    "gateway",
    "policy",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.25.0",
]

[project.optional-dependencies]
langchain = [
    "langchain-core>=1.2.11; python_version >= '3.10'",
]
langgraph = [
    "langchain-core>=1.2.11; python_version >= '3.10'",
    "langgraph>=0.2.0; python_version >= '3.10'",
]
composio = [
    "composio>=1.0.0",
]
crewai = [
    "crewai>=0.70.0",
]
google-adk = [
    "google-adk>=0.3.0",
]
openai-agents = [
    "openai-agents>=0.1.0",
]
all = [
    "langchain-core>=1.2.11; python_version >= '3.10'",
    "langgraph>=0.2.0; python_version >= '3.10'",
    "composio>=1.0.0",
    "crewai>=0.70.0",
    "google-adk>=0.3.0",
    "openai-agents>=0.1.0",
]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-httpx>=0.30.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/vellaveto/vellaveto"
Documentation = "https://github.com/vellaveto/vellaveto#python-sdk"
Repository = "https://github.com/vellaveto/vellaveto"
Issues = "https://github.com/vellaveto/vellaveto/issues"

[tool.hatch.build.targets.wheel]
packages = ["vellaveto"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true
follow_imports = "skip"
disable_error_code = ["import-untyped"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
