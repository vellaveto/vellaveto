  # AUTH (M2M)
  # ═══════════════════════════════════════════════════════════════════════════
  /api/auth/token:
    post:
      operationId: m2mToken
      summary: Exchange credentials for an M2M access token
      description: OAuth 2.0 client_credentials grant for machine-to-machine authentication.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum: [client_credentials]
                client_id:
                  type: string
                client_secret:
                  type: string
              required: [grant_type, client_id, client_secret]
      responses:
        "200":
          description: Access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    enum: [Bearer]
                  expires_in:
                    type: integer
        "401":
          description: Invalid credentials

  /api/auth/client-metadata:
    get:
      operationId: clientMetadata
      summary: Get OAuth 2.0 client metadata
      description: Returns client metadata for dynamic client registration and MCP OAuth discovery.
