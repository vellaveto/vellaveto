# ═══════════════════════════════════════════════════════════════════════════
# COMPONENTS
# ═══════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: API key passed as Bearer token
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: /iam/login
          tokenUrl: /iam/callback
          scopes:
            read: Read access
            write: Write access
            admin: Admin access

  parameters:
    PolicyId:
      name: id
      in: path
      required: true
      schema:
        type: string
        maxLength: 256
      description: Policy ID (max 256 chars, no control characters)

    VersionNumber:
      name: version
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1

    ApprovalId:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
      description: Approval ID (1-128 chars, no control characters)

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string

    # ─── Core Types ──────────────────────────────────────────────────────
    Action:
      type: object
      required: [tool, function]
      properties:
        tool:
          type: string
          description: Tool name (e.g., "file_read", "api_gateway")
          maxLength: 256
        function:
          type: string
          description: Function name (e.g., "read", "query")
          maxLength: 256
        parameters:
          type: object
          additionalProperties: true
          description: Tool call parameters (key-value pairs)
        target_paths:
          type: array
          items:
            type: string
          description: File/resource paths accessed by this action
        target_domains:
          type: array
          items:
            type: string
          description: Network domains accessed by this action
        resolved_ips:
          type: array
          items:
            type: string
          description: Resolved IP addresses

    Verdict:
      oneOf:
        - type: string
          enum: [Allow]
        - type: object
          properties:
            Deny:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
        - type: object
          properties:
            RequireApproval:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string

    Policy:
      type: object
      required: [id, name, tool_pattern, function_pattern, policy_type, priority]
      properties:
        id:
          type: string
          maxLength: 256
        name:
          type: string
          maxLength: 256
        tool_pattern:
          type: string
          description: Glob pattern matching tool names
        function_pattern:
          type: string
          description: Glob pattern matching function names
        policy_type:
          $ref: "#/components/schemas/PolicyType"
        priority:
          type: integer
          minimum: -1000
          maximum: 1000
          description: Higher priority policies are evaluated first
        path_rules:
          $ref: "#/components/schemas/PathRules"
        network_rules:
          $ref: "#/components/schemas/NetworkRules"

    PolicyType:
      oneOf:
        - type: object
          properties:
            Allow:
              type: object
        - type: object
          properties:
            Deny:
              type: object
              properties:
                reason:
                  type: string
        - type: object
          properties:
            Conditional:
              type: object
              properties:
                conditions:
                  type: object

    PathRules:
      type: object
      properties:
        allowed_paths:
          type: array
          items:
            type: string
          description: Glob patterns for allowed paths
        blocked_paths:
          type: array
          items:
            type: string
          description: Glob patterns for blocked paths

    NetworkRules:
      type: object
      properties:
        allowed_domains:
          type: array
          items:
            type: string
          description: Allowed domain patterns (e.g., "*.example.com")
        blocked_domains:
          type: array
          items:
            type: string
          description: Blocked domain patterns
        ip_rules:
          $ref: "#/components/schemas/IpRules"

    IpRules:
      type: object
      properties:
        block_private:
          type: boolean
          description: Block private/RFC1918 IP ranges
        blocked_cidrs:
          type: array
          items:
            type: string
          description: Blocked CIDR ranges
        allowed_cidrs:
          type: array
          items:
            type: string
          description: Allowed CIDR ranges

    EvaluationContext:
      type: object
      properties:
        agent_id:
          type: string
        session_id:
          type: string
        call_chain:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties:
            type: string

    # ─── Request/Response Types ─────────────────────────────────────────
    EvaluateRequest:
      allOf:
        - $ref: "#/components/schemas/Action"
        - type: object
          properties:
            context:
              $ref: "#/components/schemas/EvaluationContext"
            _test_response:
              type: object
              description: |
                Optional simulated tool response for content inspection benchmarking.
                When present, the server runs injection and DLP scanners on this content
                and includes results in the response's `inspection` field. Used by MCPSEC
                benchmark to test detection capabilities without a live proxy connection.

    EvaluateResponse:
      type: object
      required: [verdict, action]
      properties:
        verdict:
          $ref: "#/components/schemas/Verdict"
        action:
          $ref: "#/components/schemas/Action"
          description: Action with parameters redacted
        approval_id:
          type: string
          description: |
            Present when verdict is RequireApproval, or when a presented
            approved single-use approval authorized and was consumed by the action.
        trace:
          type: object
          description: Detailed evaluation trace (when trace=true)
        inspection:
          $ref: "#/components/schemas/InspectionResults"

    InspectionResults:
      type: object
      description: Content inspection results. Only present when `_test_response` is provided.
      properties:
        injection_detected:
          type: boolean
          description: Whether injection patterns were detected in the test response
        injection_patterns:
          type: array
          items:
            type: string
          description: Names of injection patterns detected (empty if none)
        dlp_findings:
          type: array
          items:
            $ref: "#/components/schemas/DlpFindingSummary"
          description: DLP findings in the test response (empty if none)

    DlpFindingSummary:
      type: object
      properties:
        pattern_name:
          type: string
          description: Name of the DLP pattern that matched
        location:
          type: string
          description: Location within the response where the finding was detected

    SimulateRequest:
      type: object
      required: [action]
      properties:
        action:
          $ref: "#/components/schemas/Action"
        context:
          $ref: "#/components/schemas/EvaluationContext"
        policy_config:
          type: string
          maxLength: 262144
          description: Inline TOML policy config for testing

    SimulateResponse:
      type: object
      properties:
        verdict:
          $ref: "#/components/schemas/Verdict"
        trace:
          type: object
        policies_checked:
          type: integer
        duration_us:
          type: integer
          format: int64

    BatchRequest:
      type: object
      required: [actions]
      properties:
        actions:
          type: array
          items:
            $ref: "#/components/schemas/Action"
          maxItems: 100
          description: Actions to evaluate (max 25 with inline config)
        policy_config:
          type: string
          maxLength: 262144

    BatchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              verdict:
                $ref: "#/components/schemas/Verdict"
              trace:
                type: object
        summary:
          type: object
          properties:
            total:
              type: integer
            allowed:
              type: integer
            denied:
              type: integer
            require_approval:
              type: integer

    ValidateRequest:
      type: object
      required: [config]
      properties:
        config:
          type: string
          maxLength: 524288
          description: TOML policy configuration to validate
        strict:
          type: boolean
          default: false

    ValidateResponse:
      type: object
      properties:
        valid:
          type: boolean
        findings:
          type: array
          items:
            $ref: "#/components/schemas/ValidationFinding"
        summary:
          type: object
        policy_count:
          type: integer

    ValidationFinding:
      type: object
      properties:
        severity:
          type: string
          enum: [error, warning, info]
        message:
          type: string
        location:
          type: string

    DiffRequest:
      type: object
      required: [before, after]
      properties:
        before:
          type: string
          maxLength: 131072
        after:
          type: string
          maxLength: 131072

    DiffResponse:
      type: object
      properties:
        added:
          type: array
          items:
            type: object
        removed:
          type: array
          items:
            type: object
        modified:
          type: array
          items:
            type: object
        unchanged:
          type: integer

    DiscoverySearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          maxLength: 1024
        max_results:
          type: integer
          default: 5
          maximum: 20
        token_budget:
          type: integer
          maximum: 1000000

    ResolveRequest:
      type: object
      properties:
        resolved_by:
          type: string
          default: anonymous
        reason:
          type: string

    ApprovalEntry:
      type: object
      properties:
        id:
          type: string
        action:
          $ref: "#/components/schemas/Action"
        reason:
          type: string
        status:
          type: string
          enum: [pending, approved, consumed, denied, expired]
        requested_by:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        resolved_by:
          type: string
        resolved_at:
          type: string
          format: date-time
          nullable: true
        consumed_at:
          type: string
          format: date-time
          nullable: true
        session_id:
          type: string
        action_fingerprint:
          type: string

    AuditEntry:
      type: object
      properties:
        id:
          type: string
        action:
          $ref: "#/components/schemas/Action"
        verdict:
          $ref: "#/components/schemas/Verdict"
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
        entry_hash:
          type: string
          description: SHA-256 hash of this entry
        prev_hash:
          type: string
          description: SHA-256 hash of previous entry (chain link)

    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        enabled:
          type: boolean
        quotas:
          type: object
        metadata:
          type: object
          additionalProperties:
            type: string

    TenantRequest:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        enabled:
          type: boolean
          default: true
        quotas:
          type: object
        metadata:
          type: object
          additionalProperties:
            type: string

    PolicyVersion:
      type: object
      properties:
        version:
          type: integer
          format: int64
        status:
          type: string
          enum: [draft, approved, active, archived]
        policy:
          $ref: "#/components/schemas/Policy"
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    CreateVersionRequest:
      type: object
      required: [policy, created_by]
      properties:
        policy:
          $ref: "#/components/schemas/Policy"
        created_by:
          type: string
        comment:
          type: string

    ApproveVersionRequest:
      type: object
      required: [approved_by]
      properties:
        approved_by:
          type: string
        comment:
          type: string

    RollbackRequest:
      type: object
      required: [to_version, created_by]
      properties:
        to_version:
          type: integer
          format: int64
        created_by:
          type: string

    RegisterNhiAgentRequest:
      type: object
      properties:
        name:
          type: string
        attestation_type:
          type: string
        spiffe_id:
          type: string
        public_key:
          type: string
          description: Agent public key (redacted in logs)
        key_algorithm:
          type: string
        ttl_secs:
          type: integer
          format: int64
          maximum: 31536000
          description: Time-to-live in seconds (max 1 year)
        tags:
          type: array
          items:
            type: string
            maxLength: 256
          maxItems: 100
        metadata:
          type: object
          additionalProperties:
            type: string
          maxProperties: 50

    CheckNhiBehaviorRequest:
      type: object
      properties:
        tool_call:
          type: string
        request_interval_secs:
          type: number
          format: double
        source_ip:
          type: string

    RotateNhiCredentialsRequest:
      type: object
      required: [new_public_key]
      properties:
        new_public_key:
          type: string
          description: New public key (redacted in logs)
        new_key_algorithm:
          type: string
        trigger:
          type: string
        new_ttl_secs:
          type: integer
          format: int64

    CreateNhiDelegationRequest:
      type: object
      required: [from_agent, to_agent]
      properties:
        from_agent:
          type: string
        to_agent:
          type: string
        permissions:
          type: array
          items:
            type: string
        scope_constraints:
          type: array
          items:
            type: string
        ttl_secs:
          type: integer
          format: int64
        reason:
          type: string

    RegisterDelegationRequest:
      type: object
      required: [session_id, from_principal, to_principal]
      properties:
        session_id:
          type: string
        from_principal:
          type: string
        to_principal:
          type: string
        allowed_tools:
          type: array
          items:
            type: string
          maxItems: 100
        expires_secs:
          type: integer
          format: int64
          minimum: 1
          maximum: 2592000

    QuarantineRequest:
      type: object
      properties:
        reason:
          type: string
        triggered_by:
          type: string

    UpgradeAuthRequest:
      type: object
      required: [level]
      properties:
        level:
          type: string
          enum: [none, basic, oauth, oauth_mfa, hardware_key]
        expires_secs:
          type: integer
          format: int64
          maximum: 86400

    ProjectorTransformRequest:
      type: object
      required: [schema, model_family]
      properties:
        schema:
          type: object
          description: Canonical tool schema
        model_family:
          type: string
          maxLength: 64
          description: Target model family (e.g., "claude", "openai", "custom:gpt-5")

    SignupRequest:
      type: object
      required: [org_name, email]
      properties:
        org_name:
          type: string
          maxLength: 200
          description: Organization name
        email:
          type: string
          maxLength: 254
          description: Contact email (RFC 5321)
        plan:
          type: string
          enum: [free, starter, team, enterprise-trial]
          default: free
          description: Plan tier

    SignupResponse:
      type: object
      properties:
        tenant_id:
          type: string
          description: Created tenant ID
        api_key:
          type: string
          description: API key (shown once, not retrievable later)
        plan:
          type: string
        server_url:
          type: string
          description: Server URL for SDK configuration
        next_steps:
          type: array
          items:
            type: string
          description: Onboarding instructions

    WebhookResponse:
      type: object
      properties:
        received:
          type: boolean
