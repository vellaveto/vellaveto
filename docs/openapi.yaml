openapi: "3.0.3"
info:
  title: Vellaveto Control Plane API
  description: |
    Security-first control plane for MCP and AI agent tool calls.
    Intercepts MCP (Model Context Protocol) and function-calling
    requests, enforces policy on paths/domains/actions, and maintains
    a tamper-evident audit trail.

    ## Authentication

    All endpoints (except `/health`, `/setup/*`, `/iam/*`, and billing
    webhooks) require one of:
    - **API Key** — `Authorization: Bearer <key>` header
    - **OAuth 2.0** — Bearer token from OIDC provider

    ## Multi-Tenancy

    Pass `X-Tenant-ID: <tenant>` header to scope requests to a tenant.
    Default tenant is used when the header is absent.

    ## Rate Limiting

    All endpoints are rate-limited. Categories:
    - **evaluate** — higher throughput (default 1000 req/s)
    - **admin** — moderate (default 100 req/s)
    - **readonly** — moderate (default 200 req/s)

    HTTP 429 is returned when limits are exceeded.
  version: 6.0.0
  license:
    name: "See LICENSING.md (multi-license model)"
    url: https://github.com/vellaveto/vellaveto/blob/main/LICENSING.md
  contact:
    name: Vellaveto
    url: https://github.com/vellaveto/vellaveto

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://vellaveto.example.com
    description: Production

tags:
  - name: Health
    description: Liveness and readiness checks
  - name: Evaluation
    description: Core policy evaluation engine
  - name: Policies
    description: Policy CRUD management
  - name: Policy Lifecycle
    description: Policy versioning, approval, and promotion
  - name: Approvals
    description: Human-in-the-loop approval workflow
  - name: Audit
    description: Audit log entries, export, and verification
  - name: Compliance
    description: Compliance framework reports and evidence packs
  - name: Tenants
    description: Multi-tenant management
  - name: NHI
    description: Non-Human Identity lifecycle management
  - name: Memory Security
    description: Memory injection defense (MINJA)
  - name: ETDI
    description: Enhanced Tool Definition Integrity (cryptographic tool security)
  - name: Discovery
    description: Tool discovery and search
  - name: Topology
    description: MCP server topology graph and crawling
  - name: Inventory
    description: Asset inventory views (agents, servers, tools, relationships)
  - name: Auth
    description: M2M authentication and OAuth client metadata
  - name: Simulator
    description: Policy simulation, validation, and red-teaming
  - name: Execution Graphs
    description: Call-chain execution graph visualization
  - name: Governance
    description: Shadow AI detection and governance reporting
  - name: ZK Audit
    description: Zero-knowledge audit proofs
  - name: Federation
    description: Agent identity federation
  - name: Billing
    description: Licensing, usage metering, and payment webhooks
  - name: IAM
    description: OIDC/SAML login, sessions, and SCIM
  - name: Circuit Breaker
    description: Per-tool circuit breaker management
  - name: Shadow Agents
    description: Shadow agent detection and trust management
  - name: Deputy
    description: Deputy delegation validation
  - name: Projector
    description: Model-specific schema projection
  - name: Observability
    description: Observability exporter management
  - name: Setup
    description: First-run setup wizard (unauthenticated)

security:
  - apiKey: []
  - oauth2: []

paths:
  # ═══════════════════════════════════════════════════════════════════════════
  # HEALTH
  # ═══════════════════════════════════════════════════════════════════════════
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns server health status. Does not require authentication.
      tags: [Health]
      security: []
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics
      description: Returns Prometheus-format metrics. Requires authentication and is rate-limited.
      tags: [Health]
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  # ═══════════════════════════════════════════════════════════════════════════
  # EVALUATION
  # ═══════════════════════════════════════════════════════════════════════════
  /api/evaluate:
    post:
      operationId: evaluate
      summary: Evaluate an action against policies
      description: |
        Core endpoint. Evaluates a tool call action against loaded policies
        and returns a verdict (Allow, Deny, or RequireApproval). The action's
        parameters are redacted in the response for security. A caller may
        optionally present `x-vellaveto-approval-id` to retry the same action
        with an already approved, scope-matching, single-use approval.
      tags: [Evaluation]
      parameters:
        - name: trace
          in: query
          schema:
            type: boolean
            default: false
          description: Enable detailed evaluation trace in response
        - name: x-vellaveto-approval-id
          in: header
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 128
          description: |
            Previously approved approval ID to reuse for the same sanitized action.
            Values must be valid UTF-8, 1-128 characters, and free of unsafe
            control characters. The server fails closed unless the approval is
            approved, any stored session binding matches the current request,
            the current sanitized action fingerprint matches, and the approval
            has not already been consumed by a prior successful allow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequest"
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ═══════════════════════════════════════════════════════════════════════════
  # POLICIES
  # ═══════════════════════════════════════════════════════════════════════════
  /api/policies:
    get:
      operationId: listPolicies
      summary: List all policies
      description: Returns all loaded policies. Tenant-scoped when X-Tenant-ID is set.
      tags: [Policies]
      responses:
        "200":
          description: Policy list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Policy"
    post:
      operationId: addPolicy
      summary: Add a new policy
      description: |
        Add a policy at runtime. Dynamic policies have priority range
        [-1000, +1000]. Max 10,000 policies per server.
      tags: [Policies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Policy"
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Duplicate policy ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/policies/{id}:
    delete:
      operationId: removePolicy
      summary: Remove a policy by ID
      tags: [Policies]
      parameters:
        - $ref: "#/components/parameters/PolicyId"
      responses:
        "200":
          description: Policy removed
        "404":
          $ref: "#/components/responses/NotFound"

  /api/policies/reload:
    post:
      operationId: reloadPolicies
      summary: Reload policies from config file
      tags: [Policies]
      responses:
        "200":
          description: Policies reloaded
        "500":
          $ref: "#/components/responses/InternalError"

  # ═══════════════════════════════════════════════════════════════════════════
  # POLICY LIFECYCLE
  # ═══════════════════════════════════════════════════════════════════════════
  /api/policies/{id}/versions:
    get:
      operationId: listPolicyVersions
      summary: List versions of a policy
      tags: [Policy Lifecycle]
      parameters:
        - $ref: "#/components/parameters/PolicyId"
      responses:
        "200":
          description: Version list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PolicyVersion"
    post:
      operationId: createPolicyVersion
      summary: Create a new policy version (Draft)
      tags: [Policy Lifecycle]
      parameters:
        - $ref: "#/components/parameters/PolicyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVersionRequest"
      responses:
        "201":
          description: Version created
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/policies/{id}/versions/{version}:
    get:
      operationId: getPolicyVersion
      summary: Get a specific policy version
      tags: [Policy Lifecycle]
      parameters:
        - $ref: "#/components/parameters/PolicyId"
        - $ref: "#/components/parameters/VersionNumber"
      responses:
        "200":
          description: Policy version details
        "404":
          $ref: "#/components/responses/NotFound"

  /api/policies/{id}/versions/{version}/approve:
    post:
      operationId: approvePolicyVersion
      summary: Approve a policy version
      tags: [Policy Lifecycle]
      parameters:
        - $ref: "#/components/parameters/PolicyId"
        - $ref: "#/components/parameters/VersionNumber"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveVersionRequest"
      responses:
        "200":
          description: Version approved

  /api/policies/{id}/versions/{version}/promote:
    post:
      operationId: promotePolicyVersion
      summary: Promote a version to active
      tags: [Policy Lifecycle]
      parameters:
        - $ref: "#/components/parameters/PolicyId"
        - $ref: "#/components/parameters/VersionNumber"
      responses:
        "200":
          description: Version promoted to active

  /api/policies/{id}/versions/{version}/archive:
    post:
      operationId: archivePolicyVersion
      summary: Archive a policy version
      tags: [Policy Lifecycle]
      parameters:
        - $ref: "#/components/parameters/PolicyId"
        - $ref: "#/components/parameters/VersionNumber"
      responses:
        "200":
          description: Version archived

  /api/policies/{id}/versions/{v1}/diff/{v2}:
    get:
      operationId: diffPolicyVersions
      summary: Compare two policy versions
      tags: [Policy Lifecycle]
      parameters:
        - $ref: "#/components/parameters/PolicyId"
        - name: v1
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: v2
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Version diff

  /api/policies/{id}/rollback:
    post:
      operationId: rollbackPolicy
      summary: Rollback to a previous version
      tags: [Policy Lifecycle]
      parameters:
        - $ref: "#/components/parameters/PolicyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollbackRequest"
      responses:
        "200":
          description: Rolled back successfully

  /api/policy-lifecycle/status:
    get:
      operationId: getPolicyLifecycleStatus
      summary: Policy lifecycle management status
      tags: [Policy Lifecycle]
      responses:
        "200":
          description: Lifecycle status

  # ═══════════════════════════════════════════════════════════════════════════
  # APPROVALS
  # ═══════════════════════════════════════════════════════════════════════════
  /api/approvals/pending:
    get:
      operationId: listPendingApprovals
      summary: List pending approval requests
      tags: [Approvals]
      responses:
        "200":
          description: Pending approvals
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  total:
                    type: integer
                  truncated:
                    type: boolean
                  approvals:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApprovalEntry"

  /api/approvals/{id}:
    get:
      operationId: getApproval
      summary: Get a specific approval request
      tags: [Approvals]
      parameters:
        - $ref: "#/components/parameters/ApprovalId"
      responses:
        "200":
          description: Approval details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalEntry"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/approvals/{id}/approve:
    post:
      operationId: approveRequest
      summary: Approve a pending request
      tags: [Approvals]
      parameters:
        - $ref: "#/components/parameters/ApprovalId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveRequest"
      responses:
        "200":
          description: Request approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalEntry"

  /api/approvals/{id}/deny:
    post:
      operationId: denyRequest
      summary: Deny a pending request
      tags: [Approvals]
      parameters:
        - $ref: "#/components/parameters/ApprovalId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveRequest"
      responses:
        "200":
          description: Request denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalEntry"

  # ═══════════════════════════════════════════════════════════════════════════
  # AUDIT
  # ═══════════════════════════════════════════════════════════════════════════
  /api/audit/entries:
    get:
      operationId: listAuditEntries
      summary: List audit entries (paginated)
      tags: [Audit]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"

  /api/audit/export:
    get:
      operationId: exportAudit
      summary: Export audit in SIEM format
      description: Export audit entries in CEF or JSONL format for SIEM ingestion.
      tags: [Audit]
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [cef, jsonl]
            default: jsonl
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: ISO 8601 timestamp filter
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        "200":
          description: Audit data in requested format
          content:
            text/plain:
              schema:
                type: string

  /api/audit/report:
    get:
      operationId: getAuditReport
      summary: Audit summary report
      tags: [Audit]
      responses:
        "200":
          description: Summary statistics

  /api/audit/verify:
    get:
      operationId: verifyAuditChain
      summary: Verify audit chain integrity
      description: |
        Verifies the SHA-256 hash chain and Ed25519 signatures
        of the audit log. Returns integrity status.
      tags: [Audit]
      responses:
        "200":
          description: Chain integrity result

  /api/audit/search:
    get:
      operationId: searchAudit
      summary: Search audit entries
      description: Full-text search across audit entries with filtering.
      tags: [Audit]
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search query
        - name: tool
          in: query
          schema:
            type: string
        - name: verdict
          in: query
          schema:
            type: string
            enum: [allow, deny, require_approval]
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        "200":
          description: Search results

  /api/audit/checkpoints:
    get:
      operationId: listCheckpoints
      summary: List audit checkpoints
      tags: [Audit]
      responses:
        "200":
          description: Checkpoint list

  /api/audit/checkpoints/verify:
    get:
      operationId: verifyCheckpoints
      summary: Verify checkpoint Ed25519 signatures
      tags: [Audit]
      responses:
        "200":
          description: Checkpoint verification result

  /api/audit/checkpoint:
    post:
      operationId: createCheckpoint
      summary: Create a new audit checkpoint
      tags: [Audit]
      responses:
        "201":
          description: Checkpoint created

  /api/audit/store/status:
    get:
      operationId: getAuditStoreStatus
      summary: Audit store status
      tags: [Audit]
      responses:
        "200":
          description: Store status

  /api/audit/entry/{id}:
    get:
      operationId: getAuditEntry
      summary: Get audit entry by ID
      tags: [Audit]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit entry
        "404":
          $ref: "#/components/responses/NotFound"

  # ═══════════════════════════════════════════════════════════════════════════
  # COMPLIANCE
  # ═══════════════════════════════════════════════════════════════════════════
  /api/compliance/status:
    get:
      operationId: getComplianceStatus
      summary: Overall compliance status
      tags: [Compliance]
      parameters:
        - name: include_nist
          in: query
          schema:
            type: boolean
            default: true
        - name: include_iso
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Compliance status across all frameworks

  /api/compliance/iso42001/report:
    get:
      operationId: getIso42001Report
      summary: ISO 42001 compliance report
      tags: [Compliance]
      responses:
        "200":
          description: ISO 42001 report

  /api/compliance/eu-ai-act/report:
    get:
      operationId: getEuAiActReport
      summary: EU AI Act compliance report
      tags: [Compliance]
      responses:
        "200":
          description: EU AI Act report

  /api/compliance/soc2/evidence:
    get:
      operationId: getSoc2Evidence
      summary: SOC 2 evidence collection
      tags: [Compliance]
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: SOC 2 evidence

  /api/compliance/soc2/access-review:
    get:
      operationId: getSoc2AccessReview
      summary: SOC 2 access review
      tags: [Compliance]
      responses:
        "200":
          description: Access review data

  /api/compliance/threat-coverage:
    get:
      operationId: getThreatCoverage
      summary: Threat coverage analysis
      tags: [Compliance]
      responses:
        "200":
          description: Coverage analysis

  /api/compliance/gap-analysis:
    get:
      operationId: getGapAnalysis
      summary: Compliance gap analysis
      tags: [Compliance]
      responses:
        "200":
          description: Gap analysis report

  /api/compliance/data-governance:
    get:
      operationId: getDataGovernance
      summary: Data governance summary
      tags: [Compliance]
      responses:
        "200":
          description: Governance summary

  /api/compliance/owasp-agentic:
    get:
      operationId: getOwaspAgenticCoverage
      summary: OWASP Agentic Security Initiative coverage
      tags: [Compliance]
      responses:
        "200":
          description: OWASP ASI coverage map

  /api/compliance/evidence-pack/status:
    get:
      operationId: getEvidencePackStatus
      summary: Evidence pack generation status
      tags: [Compliance]
      responses:
        "200":
          description: Pack status

  /api/compliance/evidence-pack/{framework}:
    get:
      operationId: getEvidencePack
      summary: Download evidence pack for a compliance framework
      tags: [Compliance]
      parameters:
        - name: framework
          in: path
          required: true
          schema:
            type: string
            enum: [eu_ai_act, soc2, iso42001, dora, nis2, cosai, adversa, owasp_asi]
      responses:
        "200":
          description: Evidence pack

  # ═══════════════════════════════════════════════════════════════════════════
  # TENANTS
  # ═══════════════════════════════════════════════════════════════════════════
  /api/tenants:
    get:
      operationId: listTenants
      summary: List all tenants
      tags: [Tenants]
      responses:
        "200":
          description: Tenant list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
    post:
      operationId: createTenant
      summary: Create a new tenant
      tags: [Tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantRequest"
      responses:
        "201":
          description: Tenant created
        "409":
          description: Duplicate tenant ID

  /api/tenants/{id}:
    get:
      operationId: getTenant
      summary: Get tenant details
      tags: [Tenants]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant details
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateTenant
      summary: Update tenant
      tags: [Tenants]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantRequest"
      responses:
        "200":
          description: Tenant updated
    delete:
      operationId: deleteTenant
      summary: Delete tenant
      tags: [Tenants]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ═══════════════════════════════════════════════════════════════════════════
  # NHI — Non-Human Identity
  # ═══════════════════════════════════════════════════════════════════════════
  /api/nhi/agents:
    get:
      operationId: listNhiAgents
      summary: List NHI agents
      tags: [NHI]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, revoked, expired]
      responses:
        "200":
          description: Agent list
    post:
      operationId: registerNhiAgent
      summary: Register a new NHI agent
      tags: [NHI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterNhiAgentRequest"
      responses:
        "201":
          description: Agent registered

  /api/nhi/agents/{id}:
    get:
      operationId: getNhiAgent
      summary: Get NHI agent details
      tags: [NHI]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent details
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: revokeNhiAgent
      summary: Revoke an NHI agent
      tags: [NHI]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent revoked

  /api/nhi/agents/{id}/activate:
    post:
      operationId: activateNhiAgent
      summary: Activate an NHI agent
      tags: [NHI]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent activated

  /api/nhi/agents/{id}/suspend:
    post:
      operationId: suspendNhiAgent
      summary: Suspend an NHI agent
      tags: [NHI]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent suspended

  /api/nhi/agents/{id}/baseline:
    get:
      operationId: getNhiBaseline
      summary: Get behavioral baseline for an agent
      tags: [NHI]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Behavioral baseline data

  /api/nhi/agents/{id}/check:
    post:
      operationId: checkNhiBehavior
      summary: Check behavior against baseline
      tags: [NHI]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckNhiBehaviorRequest"
      responses:
        "200":
          description: Behavior check result

