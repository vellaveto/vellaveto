  # ═══════════════════════════════════════════════════════════════════════════
  # TOPOLOGY
  # ═══════════════════════════════════════════════════════════════════════════
  /api/topology:
    get:
      operationId: getTopologySnapshot
      summary: Get current topology snapshot
      description: Returns the full topology graph (servers, tools, resources) as JSON. Truncated if >5,000 nodes.
      tags: [Topology]
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Topology snapshot or summary
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Topology crawling not enabled

  /api/topology/status:
    get:
      operationId: getTopologyStatus
      summary: Get topology guard status
      description: Returns guard status (loaded/bypassed), fingerprint, server/tool/resource counts, and crawled_at timestamp.
      tags: [Topology]
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Guard status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [loaded, bypassed]
                  fingerprint:
                    type: string
                  server_count:
                    type: integer
                  tool_count:
                    type: integer
                  resource_count:
                    type: integer
                  crawled_at_epoch_secs:
                    type: integer
        "404":
          description: Topology crawling not enabled

  /api/topology/recrawl:
    post:
      operationId: triggerTopologyRecrawl
      summary: Trigger immediate topology re-crawl
      description: Forces the topology crawler to re-scan all configured MCP servers immediately.
      tags: [Topology]
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Re-crawl triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        "404":
          description: Topology crawling not enabled

  /api/topology/servers/{name}:
    delete:
      operationId: removeTopologyServer
      summary: Remove a server from topology
      description: Removes a server from the static probe and triggers a re-crawl.
      tags: [Topology]
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            maxLength: 512
      responses:
        "200":
          description: Server removed
        "404":
          description: Topology crawling not enabled or server not found

